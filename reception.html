<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réception — IZAC</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--ink:#1c2535;--ink2:#5b647a;--ink3:#8b93a4;--line:#e4e7ee;--line2:#eef1f5;--bg:#f3f5f8;--card:#fff;
--accent:#1c2535;--ok:#1f7a44;--okbg:#eaf5ee;--okline:#cfe7d8;--warn:#b4660f;--warnbg:#fbf1e3;--warnline:#f0dcc0;--att:#6b7488;--attbg:#eef1f6}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:'Hanken Grotesk',system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.45}
.wrap{max-width:1140px;margin:0 auto;padding:16px 16px 60px}
/* top bar */
.top{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.brand{display:flex;align-items:baseline;gap:12px}
.logo{font-family:'Fraunces',serif;font-weight:700;letter-spacing:.22em;font-size:18px}
.brand .t{font-family:'Fraunces',serif;font-weight:600;font-size:19px}
.brand .m{font-size:12px;color:var(--ink3);font-weight:600;border-left:1px solid var(--line);padding-left:12px}
.btn{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:.12s;display:inline-flex;align-items:center;gap:7px}
.btn:hover{border-color:var(--ink3)}
.btn.dark{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.dark:hover{opacity:.9}
.btn.warn{color:var(--warn);border-color:var(--warnline);background:var(--warnbg)}
.btn.sm{padding:6px 11px;font-size:12px}
.btn:disabled{opacity:.45;cursor:default}
.ghost{background:none;border:none;color:var(--ink3);font-size:12px;cursor:pointer;font-family:inherit;font-weight:600}
/* kpis */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
.kpi .n{font-family:'Fraunces',serif;font-weight:600;font-size:26px;line-height:1}
.kpi .l{font-size:11px;color:var(--ink3);margin-top:5px;font-weight:600;letter-spacing:.02em}
.kpi.acc .n{color:var(--warn)}
/* scan */
.scan{background:var(--accent);border-radius:14px;padding:6px 6px 6px 18px;display:flex;align-items:center;gap:14px;margin-bottom:14px}
.scan .ico{color:#9aa3b6;font-size:17px}
.scan input{flex:1;border:none;border-radius:10px;padding:13px 15px;font-size:15px;font-family:inherit;outline:none;min-width:0}
.scan .hint{color:#9aa3b6;font-size:11px;max-width:230px;line-height:1.3;padding-right:8px}
.flash{min-height:16px;font-size:12.5px;font-weight:600;margin:0 2px 12px}
.flash.ok{color:var(--ok)} .flash.warn{color:var(--warn)}
/* layout */
.cols{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.22fr);gap:16px;align-items:start}
.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}
.seg{display:inline-flex;background:var(--line2);border-radius:10px;padding:3px;gap:2px;margin-bottom:12px}
.seg button{border:none;background:none;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--ink2);padding:7px 13px;border-radius:8px;cursor:pointer}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(28,37,53,.08)}
.tools{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
#filter{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;outline:none;margin:4px 0 12px}
#filter:focus{border-color:var(--ink3)}
.list{max-height:62vh;overflow:auto;margin:-4px;padding:4px}
.muted{color:var(--ink3);font-size:13px}
.empty{color:var(--ink3);font-size:13px;text-align:center;padding:46px 10px}
/* command card */
.cmd{border:1px solid var(--line);border-radius:12px;margin-bottom:9px;overflow:hidden}
.cmd-h{display:flex;align-items:center;gap:12px;padding:12px 13px;cursor:pointer;background:#fff}
.cmd-h:hover{background:#fafbfd}
.chev{color:var(--ink3);font-size:11px;transition:.15s;width:10px}
.cmd.open .chev{transform:rotate(90deg)}
.cmd-main{flex:1;min-width:0}
.cmd-t{font-weight:600;font-size:13.5px}
.cmd-s{font-size:11.5px;color:var(--ink3);margin-top:2px}
.cmd-body{border-top:1px solid var(--line2);padding:6px;display:none;background:#fcfcfd}
.cmd.open .cmd-body{display:block}
/* rows */
.row{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;cursor:pointer;transition:.1s}
.row:hover{background:#f6f8fb}
.row.flat{border:1px solid var(--line);margin-bottom:7px;background:#fff}
.row.sel{outline:2px solid var(--accent);outline-offset:-2px;background:#fafbfd}
.row-main{flex:1;min-width:0}
.row-t{font-weight:600;font-size:12.5px}
.row-s{font-size:11px;color:var(--ink3);margin-top:2px}
.late{color:var(--warn);font-weight:700}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.att{background:#c2c9d6} .dot.recu{background:var(--ok)} .dot.ecart{background:var(--warn)}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.b-att{background:var(--attbg);color:var(--att)} .b-ok{background:var(--okbg);color:var(--ok)} .b-warn{background:var(--warnbg);color:var(--warn)}
.bar{height:6px;border-radius:5px;background:#edf0f5;overflow:hidden}
.bar i{display:block;height:100%;background:var(--ok);transition:width .2s}
.minibar{width:74px;flex-shrink:0}
/* detail */
.d-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
.d-t{font-family:'Fraunces',serif;font-weight:600;font-size:20px;line-height:1.1}
.d-s{font-size:12.5px;color:var(--ink2);margin-top:4px}
.callout{background:#fafbfd;border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-size:12.5px;color:var(--ink2);margin-bottom:13px}
.callout b{color:var(--ink)}
.d-acts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.ecart-box{background:var(--warnbg);border:1px solid var(--warnline);color:var(--warn);border-radius:11px;padding:11px 13px;font-size:12.5px;font-weight:600;margin-bottom:12px}
.ecart-edit{display:flex;gap:8px;margin-bottom:12px}
.ecart-edit input{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12.5px;font-family:inherit;outline:none}
.lines-h{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin:8px 2px 9px}
.lines{max-height:42vh;overflow:auto;border:1px solid var(--line2);border-radius:11px}
.line{display:flex;align-items:center;gap:12px;padding:10px 12px;border-bottom:1px solid var(--line2);cursor:pointer}
.line:last-child{border-bottom:none}
.line:hover{background:#fafbfd}
.line.done{background:#fbfdfb}
.line.done .line-t{color:var(--ink3);text-decoration:line-through}
.chk{width:22px;height:22px;border:1.5px solid #d3d8e2;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800}
.line.done .chk{background:var(--ok);border-color:var(--ok)}
.line-main{flex:1;min-width:0}
.line-t{font-size:13px;font-weight:600}
.line-d{font-size:10.5px;color:var(--ink3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.line-q{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink2)}
/* login */
.login{max-width:380px;margin:8vh auto 0;background:#fff;border:1px solid var(--line);border-radius:18px;padding:30px 26px;text-align:center;box-shadow:0 10px 40px rgba(28,37,53,.06)}
.login .logo{font-size:20px;display:block;margin-bottom:6px}
.login h1{font-family:'Fraunces',serif;font-weight:600;font-size:19px;margin:0 0 4px}
.login p{color:var(--ink3);font-size:12.5px;margin:0 0 18px}
.login label{display:block;text-align:left;font-size:11.5px;font-weight:600;color:var(--ink2);margin:12px 2px 5px}
.login input{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-size:15px;font-family:inherit;outline:none}
.login input:focus{border-color:var(--ink)}
.login .btn{width:100%;justify-content:center;margin-top:18px;padding:12px}
.login .err{color:var(--warn);font-size:12px;font-weight:600;margin-top:12px;min-height:14px}
@media(max-width:820px){.cols{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.scan .hint{display:none}.list{max-height:none}}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="empty">Chargement…</div></div>
<script>
const SUPA_URL='https://imurxmsglmpgxdbavalk.supabase.co';
const SUPA_KEY='sb_publishable_-FqQ5I6tx4rCUwUqmsf5DA_IFsfkUlQ';
const FLUX_EMAIL='yytabares@gmail.com'; // test — remettre 'flux@izac.fr' en production
let sb=null, MAG=null, PINHASH=null;
let COLIS=[], byCode={}, byCmd={}, cmds=[];
const state={};            // code -> {statut, note, ok:Set(idx)}
let current=null, vmode='cmd', filter='todo', openCmd=null;

const esc=s=>(s||'').toString().replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const qs=k=>new URLSearchParams(location.search).get(k);
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}
function today0(){const d=new Date();d.setHours(0,0,0,0);return d;}
const fmtJM=s=>new Date(s).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
const isLate=c=>c.created_at&&new Date(c.created_at)<today0();
const statusOf=c=>{const s=state[c.code];return s&&s.statut?s.statut:'attendu';};
const BADGE={attendu:['Attendu','b-att'],recu:['Reçu','b-ok'],ecart:['Écart','b-warn']};

async function init(){
  sb=supabase.createClient(SUPA_URL,SUPA_KEY);
  MAG=qs('mag');
  renderLogin();
  Object.assign(window,{doLogin,loadData,onScan,openColis,receiveColis,toggleLine,checkAll,saveEcart,toggleEcart,fluxEmail,buildFlux,setMode,setFilter,toggleCmd,state});
}
function renderLogin(){
  document.getElementById('app').innerHTML=
   '<div class="login"><span class="logo">I Z A C</span><h1>Réception marchandises</h1>'
   +'<p>Connecte-toi avec le code et le PIN de ton magasin.</p>'
   +'<label>Code magasin</label><input id="mag-in" inputmode="numeric" value="'+esc(MAG||'')+'" placeholder="ex. 1740">'
   +'<label>Code PIN</label><input id="pin-in" type="password" inputmode="numeric" placeholder="••••">'
   +'<button class="btn dark" id="loginBtn">Entrer</button><div class="err" id="loginErr"></div></div>';
  const f=()=>doLogin();
  document.getElementById('loginBtn').addEventListener('click',f);
  document.getElementById('pin-in').addEventListener('keydown',e=>{if(e.key==='Enter')f();});
  (MAG?document.getElementById('pin-in'):document.getElementById('mag-in')).focus();
}
async function doLogin(){
  const code=(document.getElementById('mag-in').value||'').trim();
  const pin=(document.getElementById('pin-in').value||'').trim();
  const err=document.getElementById('loginErr');
  if(!code||!pin){err.textContent='Entre ton code magasin et ton PIN.';return;}
  document.getElementById('loginBtn').disabled=true; err.textContent='';
  try{
    const hash=await sha256(pin);
    const {data,error}=await sb.rpc('mag_data',{p_code:code,p_hash:hash});
    if(error){err.textContent='Erreur de connexion, réessaie.';document.getElementById('loginBtn').disabled=false;return;}
    if(!data||!data.ok){err.textContent='Code magasin ou PIN incorrect.';document.getElementById('loginBtn').disabled=false;return;}
    MAG=code; PINHASH=hash; loadData(data);
  }catch(e){err.textContent='Erreur : '+(e.message||e);document.getElementById('loginBtn').disabled=false;}
}
function loadData(data){
  COLIS=(data.colis||[]).slice(); byCode={}; byCmd={}; cmds=[];
  COLIS.forEach(c=>{
    let cont=c.contenu; if(typeof cont==='string'){try{cont=JSON.parse(cont||'[]');}catch(e){cont=[];}} if(!Array.isArray(cont))cont=[];
    c.art=cont.map((a,i)=>({ean:a.ean,qte:+a.qte||1,lib:a.lib,fam:a.fam,taille:a.taille,coul:a.coul,id:i}));
    byCode[c.code]=c;
    if(!byCmd[c.cde]){byCmd[c.cde]=[];cmds.push(c.cde);}
    byCmd[c.cde].push(c.code);
  });
  (data.reception||[]).forEach(r=>{state[r.colis_code]={statut:r.statut,note:r.note||'',ok:new Set(r.lignes_ok||[])};});
  window.COLIS=COLIS;window.byCode=byCode;window.byCmd=byCmd;
  renderApp();
}
function renderApp(){
  document.getElementById('app').innerHTML=
   '<div class="top"><div class="brand"><span class="logo">I Z A C</span><span class="t">Réception</span><span class="m">Magasin '+esc(MAG)+'</span></div>'
   +'<div style="display:flex;gap:8px;align-items:center"><button class="btn warn" id="fluxBtn">✉ Email service Flux</button><button class="ghost" id="logoutBtn">Changer de magasin</button></div></div>'
   +'<div class="kpis" id="kpis"></div>'
   +'<div class="scan"><span class="ico">⤷</span><input id="scan" placeholder="Scannez un colis, puis ses articles…" autocomplete="off"><span class="hint">Scannez le code-barres d\'un colis pour le recevoir, puis les articles pour les contrôler.</span></div>'
   +'<div class="flash" id="flash"></div>'
   +'<div class="cols"><div class="panel"><div class="tools"><div class="seg"><button id="m-cmd" onclick="setMode(\'cmd\')">Par commande</button><button id="m-colis" onclick="setMode(\'colis\')">Par colis</button></div><span class="muted" id="count"></span></div>'
   +'<input id="filter" placeholder="Filtrer (commande ou colis)…" autocomplete="off"><div id="list" class="list"></div></div>'
   +'<div class="panel"><div id="detail"><div class="empty">Sélectionnez un colis à gauche, ou scannez-le.</div></div></div></div>';
  document.getElementById('fluxBtn').addEventListener('click',fluxEmail);
  document.getElementById('logoutBtn').addEventListener('click',()=>{MAG=qs('mag');PINHASH=null;current=null;renderLogin();});
  document.getElementById('scan').addEventListener('keydown',e=>{if(e.key==='Enter'){onScan(e.target.value);e.target.value='';}});
  document.getElementById('filter').addEventListener('input',e=>{filter_q=e.target.value;renderList();});
  document.getElementById('scan').focus();
  renderKpis(); renderSeg(); renderList();
}
let filter_q='';
function renderKpis(){
  const recu=COLIS.filter(c=>statusOf(c)==='recu').length, ec=COLIS.filter(c=>statusOf(c)==='ecart').length, att=COLIS.length-recu-ec;
  const k=(n,l,acc)=>'<div class="kpi'+(acc?' acc':'')+'"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';
  document.getElementById('kpis').innerHTML=k(cmds.length,'COMMANDES')+k(att,'À RECEVOIR')+k(recu,'COLIS REÇUS')+k(ec,'ÉCARTS',ec>0);
}
function renderSeg(){document.getElementById('m-cmd').className=vmode==='cmd'?'on':'';document.getElementById('m-colis').className=vmode==='colis'?'on':'';}
function setMode(m){vmode=m;renderSeg();renderList();}
function setFilter(f){filter=f;renderList();}
function cmdStats(cde){const codes=byCmd[cde];let recu=0,ec=0,pcs=0;codes.forEach(cd=>{const s=statusOf(byCode[cd]);if(s==='recu')recu++;else if(s==='ecart')ec++;pcs+=byCode[cd].pieces;});return {n:codes.length,recu,ec,pcs};}
function rowColis(code,flat){const c=byCode[code],st=statusOf(c),b=BADGE[st];
  const late=(st!=='recu'&&isLate(c))?' · <span class="late">depuis '+fmtJM(c.created_at)+'</span>':'';
  return '<div class="row'+(flat?' flat':'')+(current===code?' sel':'')+'" onclick="openColis(\''+code+'\')"><span class="dot '+st+'"></span><div class="row-main"><div class="row-t">Colis '+esc(code)+'</div><div class="row-s">'+c.pieces+' pcs · '+c.art.length+' réf.'+late+'</div></div><span class="badge '+b[1]+'">'+b[0]+'</span></div>';}
function matchQ(c){const q=(filter_q||'').toLowerCase().trim();return !q||c.code.toLowerCase().includes(q)||(c.cde||'').toLowerCase().includes(q);}
function renderList(){
  renderKpis();
  const list=document.getElementById('list'); let n=0;
  if(vmode==='cmd'){
    const items=cmds.filter(cde=>byCmd[cde].some(cd=>matchQ(byCode[cd])));
    n=items.length;
    list.innerHTML=items.map(cde=>{const s=cmdStats(cde),pct=s.n?Math.round(100*s.recu/s.n):0,open=openCmd===cde;
      const sub=byCmd[cde].filter(cd=>matchQ(byCode[cd])).map(cd=>rowColis(cd,false)).join('');
      return '<div class="cmd'+(open?' open':'')+'"><div class="cmd-h" onclick="toggleCmd(\''+esc(cde)+'\')"><span class="chev">▶</span><div class="cmd-main"><div class="cmd-t">Commande '+esc(cde)+'</div><div class="cmd-s">'+s.n+' colis · '+s.recu+' reçu'+(s.recu>1?'s':'')+(s.ec?' · '+s.ec+' écart'+(s.ec>1?'s':''):'')+' · '+s.pcs+' pcs</div></div><div class="minibar bar"><i style="width:'+pct+'%"></i></div></div><div class="cmd-body">'+sub+'</div></div>';
    }).join('')||'<div class="empty">Aucune commande.</div>';
    document.getElementById('count').textContent=n+' commande'+(n>1?'s':'');
  }else{
    let items=COLIS.filter(c=>filter==='done'?statusOf(c)==='recu':statusOf(c)!=='recu').filter(matchQ);
    if(filter!=='done')items.sort((a,b)=>(a.created_at||'').localeCompare(b.created_at||''));
    n=items.length;
    const todo=COLIS.filter(c=>statusOf(c)!=='recu').length, done=COLIS.filter(c=>statusOf(c)==='recu').length;
    list.innerHTML='<div class="seg" style="margin-bottom:10px"><button class="'+(filter==='todo'?'on':'')+'" onclick="setFilter(\'todo\')">À traiter ('+todo+')</button><button class="'+(filter==='done'?'on':'')+'" onclick="setFilter(\'done\')">Reçus ('+done+')</button></div>'
      +(items.map(c=>rowColis(c.code,true)).join('')||'<div class="empty">'+(filter==='done'?'Aucun colis reçu.':'Rien à recevoir — tout est traité ✓')+'</div>');
    document.getElementById('count').textContent=n+' colis';
  }
}
function toggleCmd(cde){openCmd=openCmd===cde?null:cde;renderList();}
function st_(code){return state[code]=state[code]||{statut:'',note:'',ok:new Set()};}
async function persist(code){const s=st_(code);
  try{const {data,error}=await sb.rpc('mag_save',{p_code:MAG,p_hash:PINHASH,p_colis:code,p_statut:s.statut||'attendu',p_note:s.note||'',p_ok:[...s.ok]});
    if(error||data===false)flash('Sauvegarde refusée — reconnecte-toi.',true);}
  catch(e){flash('Sauvegarde impossible (réseau).',true);}
}
function openColis(code){
  current=code;const c=byCode[code];if(!c)return;
  if(!openCmd||byCmd[c.cde].indexOf(code)<0){openCmd=c.cde;}
  const codes=byCmd[c.cde],recuN=codes.filter(x=>statusOf(byCode[x])==='recu').length,miss=codes.filter(x=>statusOf(byCode[x])!=='recu');
  const s=st_(code),ok=s.ok,st=statusOf(c);
  const okN=c.art.filter(a=>ok.has(a.id)).length,pct=c.art.length?Math.round(100*okN/c.art.length):0;
  const lines=c.art.map(a=>{const on=ok.has(a.id);
    const t=(a.fam||'ARTICLE')+(a.coul?' · '+a.coul:'')+(a.taille?' · T.'+a.taille:'');
    return '<div class="line'+(on?' done':'')+'" onclick="toggleLine(\''+code+'\','+a.id+')"><div class="chk">'+(on?'✓':'')+'</div><div class="line-main"><div class="line-t">'+esc(t)+'</div>'+(a.lib&&a.lib!==a.fam?'<div class="line-d">'+esc(a.lib)+'</div>':'')+'</div><div class="line-q">×'+a.qte+'</div></div>';}).join('');
  let h='<div class="d-head"><div><div class="d-t">Colis '+esc(code)+'</div><div class="d-s">Commande '+esc(c.cde)+' · '+c.pieces+' pièces · '+c.art.length+' références</div></div><span class="badge '+BADGE[st][1]+'">'+BADGE[st][0]+'</span></div>';
  h+='<div class="callout">Commande '+esc(c.cde)+' : <b>'+recuN+'/'+codes.length+'</b> colis reçus'+(miss.length?' · manquants : '+miss.map(esc).join(', '):' · complète ✓')+'</div>';
  h+='<div class="d-acts"><button class="btn dark" onclick="receiveColis(\''+code+'\')">✓ Marquer le colis reçu</button><button class="btn" onclick="checkAll(\''+code+'\')">Tout cocher</button><button class="btn warn" onclick="toggleEcart(\''+code+'\')">⚠ Signaler un écart</button></div>';
  if(st==='ecart')h+='<div class="ecart-box">⚠ Écart signalé : '+esc(s.note||'(motif non précisé)')+'</div>';
  h+='<div id="ecart-edit"></div>';
  h+='<div class="lines-h"><span>Contrôle des articles</span><span>'+okN+' / '+c.art.length+' pointés</span></div><div class="bar" style="margin:0 2px 10px"><i style="width:'+pct+'%"></i></div>';
  h+='<div class="lines">'+lines+'</div>';
  document.getElementById('detail').innerHTML=h;renderList();
}
function toggleLine(code,id){const s=st_(code);if(s.ok.has(id))s.ok.delete(id);else s.ok.add(id);persist(code);openColis(code);}
function checkAll(code){const s=st_(code);byCode[code].art.forEach(a=>s.ok.add(a.id));persist(code);openColis(code);}
function receiveColis(code){const s=st_(code);s.statut='recu';persist(code);openColis(code);flash('Colis '+code+' reçu ✓');}
function toggleEcart(code){const c=byCode[code],s=st_(code);
  const miss=c.art.filter(a=>!s.ok.has(a.id));
  const sugg=s.note|| (miss.length?(miss.length+' article(s) non pointé(s)'):'');
  document.getElementById('ecart-edit').innerHTML='<div class="ecart-edit"><input id="ecart-in" placeholder="Motif (colis manquant, abîmé, pièces en moins…)" value="'+esc(sugg)+'"><button class="btn warn" onclick="saveEcart(\''+code+'\')">Enregistrer l\'écart</button></div>'
    +(miss.length?'<div class="muted" style="margin:-4px 2px 12px;font-size:11.5px">Les '+miss.length+' article(s) non cochés seront joints au mail service Flux.</div>':'');
  const el=document.getElementById('ecart-in');if(el){el.focus();el.select();}
}
function saveEcart(code){const s=st_(code);s.statut='ecart';s.note=(document.getElementById('ecart-in')||{value:''}).value.trim();persist(code);openColis(code);flash('Écart enregistré.');}
function flash(m,w){const e=document.getElementById('flash');if(!e)return;e.textContent=m;e.className='flash '+(w?'warn':'ok');clearTimeout(flash._t);flash._t=setTimeout(()=>{e.textContent='';e.className='flash';},2600);}
function buildFlux(){
  const ecs=COLIS.filter(c=>statusOf(c)==='ecart');
  const d=new Date().toLocaleDateString('fr-FR');
  let body='Magasin '+MAG+' — Écarts réception du '+d+'\n\n';
  ecs.forEach(c=>{const s=state[c.code];
    body+='— Commande '+c.cde+' · Colis '+c.code+'\n  Motif : '+(s.note||'(non précisé)')+'\n';
    const miss=c.art.filter(a=>!s.ok.has(a.id));
    if(miss.length){body+='  Articles non pointés :\n';miss.forEach(a=>{body+='    • '+((a.lib||a.fam||'')+(a.coul?' · '+a.coul:'')+(a.taille?' · T.'+a.taille:''))+' · x'+a.qte+'  (EAN '+a.ean+')\n';});}
    body+='\n';});
  return {count:ecs.length, subject:'Écarts réception — Magasin '+MAG+' — '+d, body};
}
function fluxEmail(){
  const f=buildFlux();
  if(!f.count){flash('Aucun écart à signaler.');return;}
  try{window.location.href='mailto:'+FLUX_EMAIL+'?subject='+encodeURIComponent(f.subject)+'&body='+encodeURIComponent(f.body);}catch(e){}
  flash(f.count+' écart(s) → email service Flux prêt à envoyer.');
}
function onScan(v){v=(v||'').trim();if(!v)return;
  if(byCode[v]){receiveColis(v);openColis(v);return;}
  if(current){const a=byCode[current].art.find(x=>x.ean===v);if(a){st_(current).ok.add(a.id);persist(current);openColis(current);flash('Article pointé ✓');return;}}
  flash('Code inconnu : '+v,true);
}
window.addEventListener('DOMContentLoaded',init);
window.__init=init;
</script>
</body>
</html>
