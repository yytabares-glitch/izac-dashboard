<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réception — IZAC</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#EDEFF3;--ink:#263145;--ink2:#5b647a;--ink3:#828a9c;--line:#E5E9F2;--line2:#EEF1F6;--card:#fff;
--blue:#2563EB;--blue2:#1E3A8A;--bluebg:#eaf0fe;--accent:#2563EB;--ok:#059669;--okbg:#e7f5ef;--okline:#c7e9da;--warn:#D97706;--warnbg:#fbf2e3;--warnline:#f0dcc0}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:'Hanken Grotesk',system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
.wrap{max-width:1120px;margin:0 auto;padding:18px 18px 64px}
/* header */
.top{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:13px}
.mark{font-weight:800;letter-spacing:.16em;font-size:17px}
.sep{width:1px;height:18px;background:var(--line)}
.brand .sub{font-size:13px;color:var(--ink2);font-weight:600}
.chip{background:var(--blue);color:#fff;font-size:11px;font-weight:700;padding:4px 11px;border-radius:30px;letter-spacing:.02em}
.btn{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:11px;padding:10px 15px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:.12s;display:inline-flex;align-items:center;gap:8px}
.btn:hover{border-color:var(--ink3)}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{opacity:.9}
.btn.warn{color:var(--warn);border-color:var(--warnline);background:var(--warnbg)}
.btn.warn:hover{border-color:var(--warn)}
.btn.big{padding:14px 16px;font-size:14px;flex:1;justify-content:center}
.btn:disabled{opacity:.45;cursor:default}
.ghost{background:none;border:none;color:var(--ink3);font-size:12.5px;cursor:pointer;font-family:inherit;font-weight:600}
.ghost:hover{color:var(--ink2)}
/* kpis */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px}
.kpi .n{font-weight:800;font-size:27px;line-height:1;letter-spacing:-.02em}
.kpi .l{font-size:11.5px;color:var(--ink2);margin-top:6px;font-weight:600}
.kpi.acc .n{color:var(--warn)}
/* scan */
.scan{display:flex;align-items:center;gap:0;margin-bottom:16px;background:var(--bluebg);border:2px solid var(--blue);border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(37,99,235,.12)}
.scan .ic{padding:0 4px 0 18px;color:var(--blue);font-size:20px}
.scan input{flex:1;border:none;padding:16px 14px;font-size:15.5px;font-family:inherit;outline:none;background:transparent;min-width:0;font-weight:500}
.scan input::placeholder{color:#7d93c8}
.scan .tag{font-size:11px;color:#fff;background:var(--blue);padding:6px 12px;border-radius:30px;margin-right:12px;font-weight:700;white-space:nowrap}
.flash{min-height:17px;font-size:13px;font-weight:600;margin:0 2px 14px}
.flash.ok{color:var(--ok)} .flash.warn{color:var(--warn)}
/* layout */
.cols{display:grid;grid-template-columns:minmax(0,.92fr) minmax(0,1.28fr);gap:16px;align-items:start}
.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:7px}
.phead{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 11px 8px}
.seg{display:inline-flex;background:var(--line2);border-radius:11px;padding:3px;gap:2px}
.seg button{border:none;background:none;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--ink2);padding:8px 14px;border-radius:9px;cursor:pointer;transition:.1s}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(20,22,27,.1)}
.count{font-size:12px;color:var(--ink3);font-weight:600;padding-right:6px}
.search{margin:2px 7px 8px;position:relative}
.search input{width:100%;border:1px solid var(--line);border-radius:11px;padding:10px 12px;font-size:13px;font-family:inherit;outline:none}
.search input:focus{border-color:var(--ink3)}
.list{max-height:64vh;overflow:auto;padding:0 4px 4px}
.empty{color:var(--ink3);font-size:13px;text-align:center;padding:48px 12px;line-height:1.6}
/* command card */
.cmd{border:1px solid var(--line);border-radius:13px;margin:0 3px 9px;overflow:hidden}
.cmd-h{display:flex;align-items:center;gap:12px;padding:13px;cursor:pointer}
.cmd-h:hover{background:#fafaf8}
.chev{color:var(--ink3);font-size:10px;transition:.15s;width:9px;flex-shrink:0}
.cmd.open .chev{transform:rotate(90deg)}
.cmd-main{flex:1;min-width:0}
.cmd-t{font-weight:700;font-size:13.5px}
.cmd-s{font-size:11.5px;color:var(--ink2);margin-top:3px}
.cmd-body{border-top:1px solid var(--line2);padding:5px;display:none;background:#fbfbf9}
.cmd.open .cmd-body{display:block}
.minibar{width:60px;flex-shrink:0}
/* rows */
.row{display:flex;align-items:center;gap:11px;padding:11px;border-radius:10px;cursor:pointer;transition:.1s}
.row:hover{background:#f7f7f4}
.row.flat{border:1px solid var(--line);margin:0 3px 8px;background:#fff}
.row.sel{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue);background:var(--bluebg)}
.row-main{flex:1;min-width:0}
.row-t{font-weight:700;font-size:13px}
.row-s{font-size:11.5px;color:var(--ink2);margin-top:2px}
.late{color:var(--warn);font-weight:700}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot.attendu{background:#c8ccd4}.dot.recu{background:var(--ok)}.dot.ecart{background:var(--warn)}
.badge{font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:30px;white-space:nowrap}
.b-attendu{background:#eef0f3;color:var(--ink2)}.b-recu{background:var(--okbg);color:var(--ok)}.b-ecart{background:var(--warnbg);color:var(--warn)}
.bar{height:6px;border-radius:6px;background:#edeeea;overflow:hidden}
.bar i{display:block;height:100%;background:var(--ok);transition:width .25s}
/* detail */
.d-pad{padding:13px}
.d-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:13px}
.d-t{font-weight:800;font-size:20px;letter-spacing:-.01em}
.d-s{font-size:12.5px;color:var(--ink2);margin-top:4px}
.callout{background:#fafaf8;border:1px solid var(--line);border-radius:12px;padding:11px 13px;font-size:12.5px;color:var(--ink2);margin-bottom:13px}
.callout b{color:var(--ink)}
.ctrl-h{display:flex;justify-content:space-between;align-items:center;margin:4px 2px 9px}
.ctrl-h .t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3)}
.ctrl-h .c{font-size:12px;font-weight:700;color:var(--ink2)}
.lines{border:1px solid var(--line);border-radius:13px;overflow:hidden;margin-bottom:7px}
.line{display:flex;align-items:center;gap:13px;padding:12px 13px;border-bottom:1px solid var(--line2);cursor:pointer;transition:.08s}
.line:last-child{border-bottom:none}
.line:hover{background:#fafaf8}
.line.done{background:#fbfdfb}
.chk{width:24px;height:24px;border:2px solid #d2d6dd;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800;transition:.1s}
.line.done .chk{background:var(--ok);border-color:var(--ok)}
.line-main{flex:1;min-width:0}
.line-name{font-size:13.5px;font-weight:700;letter-spacing:-.01em}
.line.done .line-name{color:var(--ink3);text-decoration:line-through}
.line-fam{font-size:11px;color:var(--ink3);margin-top:2px}
.line-q{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--ink2)}
.acts{display:flex;gap:9px;margin-top:13px}
.ecart-box{background:var(--warnbg);border:1px solid var(--warnline);border-radius:13px;padding:13px;margin-top:12px}
.ecart-box .et{font-weight:700;color:var(--warn);font-size:13px;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.ecart-box ul{margin:0 0 11px;padding:0;list-style:none}
.ecart-box li{font-size:12.5px;color:var(--ink);padding:4px 0;border-bottom:1px solid var(--warnline)}
.ecart-box li:last-child{border-bottom:none}
.ecart-box li .e-fam{color:var(--warn);font-size:10.5px}
.note-in{width:100%;border:1px solid var(--warnline);border-radius:10px;padding:9px 11px;font-size:12.5px;font-family:inherit;outline:none;margin-bottom:10px;background:#fff}
.ecart-acts{display:flex;gap:8px}
/* login */
.login{max-width:370px;margin:9vh auto 0;background:#fff;border:1px solid var(--line);border-radius:20px;padding:34px 28px 28px;text-align:center;box-shadow:0 14px 50px rgba(20,22,27,.07)}
.login .mark{display:block;font-size:21px;margin-bottom:18px}
.login h1{font-weight:700;font-size:18px;margin:0 0 5px}
.login p{color:var(--ink3);font-size:12.5px;margin:0 0 20px}
.login label{display:block;text-align:left;font-size:11.5px;font-weight:700;color:var(--ink2);margin:14px 3px 6px}
.login input{width:100%;border:1px solid var(--line);border-radius:12px;padding:13px 15px;font-size:16px;font-family:inherit;outline:none;text-align:center;letter-spacing:.04em}
.login input:focus{border-color:var(--ink)}
.login .btn{width:100%;justify-content:center;margin-top:20px;padding:13px}
.login .err{color:var(--warn);font-size:12px;font-weight:600;margin-top:13px;min-height:14px}
.modal{position:fixed;inset:0;background:rgba(38,49,69,.45);display:flex;align-items:center;justify-content:center;padding:18px;z-index:50}
.modal.hide{display:none}
.modal-card{background:#fff;border-radius:18px;max-width:540px;width:100%;padding:22px;box-shadow:0 22px 60px rgba(38,49,69,.3);max-height:86vh;overflow:auto}
.modal-h{font-weight:800;font-size:17px;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--ink3);font-weight:600;margin-bottom:13px}
.modal-warn{background:var(--warnbg);border:1px solid var(--warnline);color:var(--warn);border-radius:10px;padding:10px 12px;font-size:12px;font-weight:600;margin-bottom:14px}
.modal-body{background:#f5f8fd;border:1px solid var(--line);border-radius:12px;padding:13px 15px;font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--ink);white-space:pre-wrap;line-height:1.55;margin:0 0 16px}
.modal-acts{display:flex;gap:10px;justify-content:flex-end}
@media(max-width:820px){.cols{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.scan .tag{display:none}.list{max-height:none}}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="empty">Chargement…</div></div>
<script>
const SUPA_URL='https://imurxmsglmpgxdbavalk.supabase.co';
const SUPA_KEY='sb_publishable_-FqQ5I6tx4rCUwUqmsf5DA_IFsfkUlQ';
const FLUX_EMAIL='yytabares@gmail.com'; // test — remettre 'flux@izac.fr' en production
let sb=null, MAG=null, PINHASH=null;
let COLIS=[], byCode={}, byCmd={}, cmds=[];
const state={};
let current=null, vmode='cmd', filter='todo', openCmd=null, fq='';

const esc=s=>(s||'').toString().replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const qs=k=>new URLSearchParams(location.search).get(k);
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}
function today0(){const d=new Date();d.setHours(0,0,0,0);return d;}
const fmtJM=s=>new Date(s).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
const isLate=c=>c.created_at&&new Date(c.created_at)<today0();
const statusOf=c=>{const s=state[c.code];return s&&s.statut?s.statut:'attendu';};
const BADGE={attendu:['À recevoir','b-attendu'],recu:['Reçu','b-recu'],ecart:['Écart','b-ecart']};
// nom : RÉFÉRENCE · T.taille · couleur   (famille à part, en gris)
function artName(a){const r=(a.ref||'').trim()||(a.lib||'').trim()||(a.fam||'').trim()||'Article';const parts=[r];if(a.taille)parts.push('T.'+String(a.taille).trim());if(a.coul)parts.push(String(a.coul).trim());return parts.join(' · ');}
function artFam(a){return (a.fam||'').trim();}

async function init(){
  sb=supabase.createClient(SUPA_URL,SUPA_KEY);
  MAG=qs('mag'); renderLogin();
  Object.assign(window,{doLogin,loadData,onScan,openColis,conform,signalMiss,clearEcart,toggleLine,saveNote,fluxEmail,confirmEmail,closeModal,buildFlux,setMode,setFilter,toggleCmd,state});
}
function renderLogin(){
  document.getElementById('app').innerHTML=
   '<div class="login"><span class="mark">IZAC</span><h1>Réception marchandises</h1>'
   +'<p>Connecte-toi avec le code et le PIN de ton magasin.</p>'
   +'<label>Code magasin</label><input id="mag-in" inputmode="numeric" value="'+esc(MAG||'')+'" placeholder="1740">'
   +'<label>Code PIN</label><input id="pin-in" type="password" inputmode="numeric" placeholder="••••">'
   +'<button class="btn primary" id="loginBtn">Entrer</button><div class="err" id="loginErr"></div></div>';
  document.getElementById('loginBtn').addEventListener('click',doLogin);
  document.getElementById('pin-in').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  (MAG?document.getElementById('pin-in'):document.getElementById('mag-in')).focus();
}
async function doLogin(){
  const code=(document.getElementById('mag-in').value||'').trim();
  const pin=(document.getElementById('pin-in').value||'').trim();
  const err=document.getElementById('loginErr');
  if(!code||!pin){err.textContent='Entre ton code magasin et ton PIN.';return;}
  document.getElementById('loginBtn').disabled=true; err.textContent='';
  try{
    const hash=await sha256(pin);
    const {data,error}=await sb.rpc('mag_data',{p_code:code,p_hash:hash});
    if(error){err.textContent='Erreur de connexion, réessaie.';document.getElementById('loginBtn').disabled=false;return;}
    if(!data||!data.ok){err.textContent='Code magasin ou PIN incorrect.';document.getElementById('loginBtn').disabled=false;return;}
    MAG=code; PINHASH=hash; loadData(data);
  }catch(e){err.textContent='Erreur : '+(e.message||e);document.getElementById('loginBtn').disabled=false;}
}
function loadData(data){
  COLIS=(data.colis||[]).slice(); byCode={}; byCmd={}; cmds=[];
  COLIS.forEach(c=>{
    let cont=c.contenu; if(typeof cont==='string'){try{cont=JSON.parse(cont||'[]');}catch(e){cont=[];}} if(!Array.isArray(cont))cont=[];
    c.art=cont.map((a,i)=>({ean:a.ean,qte:+a.qte||1,ref:a.ref,lib:a.lib,fam:a.fam,taille:a.taille,coul:a.coul,id:i}));
    byCode[c.code]=c;
    if(!byCmd[c.cde]){byCmd[c.cde]=[];cmds.push(c.cde);}
    byCmd[c.cde].push(c.code);
  });
  (data.reception||[]).forEach(r=>{state[r.colis_code]={statut:r.statut,note:r.note||'',ok:new Set(r.lignes_ok||[])};});
  window.COLIS=COLIS;window.byCode=byCode;window.byCmd=byCmd;
  renderApp();
}
function renderApp(){
  document.getElementById('app').innerHTML=
   '<div class="top"><div class="brand"><span class="mark">IZAC</span><span class="sep"></span><span class="sub">Réception</span><span class="chip">Magasin '+esc(MAG)+'</span></div>'
   +'<div style="display:flex;gap:9px;align-items:center"><button class="btn warn" id="fluxBtn">Signaler les écarts au service Flux</button><button class="ghost" id="logoutBtn">Changer de magasin</button></div></div>'
   +'<div class="kpis" id="kpis"></div>'
   +'<div class="scan"><span class="ic">⤷</span><input id="scan" placeholder="Scannez un colis, puis ses articles…" autocomplete="off"><span class="tag">douchette ou clavier</span></div>'
   +'<div class="flash" id="flash"></div>'
   +'<div class="cols"><div class="panel"><div class="phead"><div class="seg"><button id="m-cmd" onclick="setMode(\'cmd\')">Par commande</button><button id="m-colis" onclick="setMode(\'colis\')">Par colis</button></div><span class="count" id="count"></span></div>'
   +'<div class="search"><input id="filter" placeholder="Rechercher une commande ou un colis…" autocomplete="off"></div><div id="list" class="list"></div></div>'
   +'<div class="panel"><div id="detail"><div class="empty">Sélectionnez un colis à gauche,<br>ou scannez son code-barres.</div></div></div></div>'
   +'<div id="modal" class="modal hide"><div class="modal-card"><div class="modal-h">Vérifie avant d\'envoyer au service Flux</div><div class="modal-sub" id="modal-to"></div><div class="modal-warn">⚠ Un email envoyé = demande de traitement. Relis bien : si c\'est faux, corrige avant d\'envoyer.</div><pre class="modal-body" id="modal-body"></pre><div class="modal-acts"><button class="btn" onclick="closeModal()">Corriger</button><button class="btn primary" id="modal-send">✓ Confirmer et envoyer</button></div></div></div>';
  document.getElementById('fluxBtn').addEventListener('click',()=>fluxEmail());
  document.getElementById('modal-send').addEventListener('click',confirmEmail);
  document.getElementById('logoutBtn').addEventListener('click',()=>{MAG=qs('mag');PINHASH=null;current=null;renderLogin();});
  document.getElementById('scan').addEventListener('keydown',e=>{if(e.key==='Enter'){onScan(e.target.value);e.target.value='';}});
  document.getElementById('filter').addEventListener('input',e=>{fq=e.target.value;renderList();});
  document.getElementById('scan').focus();
  renderKpis(); renderSeg(); renderList();
}
function renderKpis(){
  const recu=COLIS.filter(c=>statusOf(c)==='recu').length, ec=COLIS.filter(c=>statusOf(c)==='ecart').length, att=COLIS.length-recu-ec;
  const k=(n,l,acc)=>'<div class="kpi'+(acc?' acc':'')+'"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';
  document.getElementById('kpis').innerHTML=k(cmds.length,'Commandes')+k(att,'Colis à recevoir')+k(recu,'Colis reçus')+k(ec,'Écarts',ec>0);
}
function renderSeg(){document.getElementById('m-cmd').className=vmode==='cmd'?'on':'';document.getElementById('m-colis').className=vmode==='colis'?'on':'';}
function setMode(m){vmode=m;renderSeg();renderList();}
function setFilter(f){filter=f;renderList();}
function cmdStats(cde){const codes=byCmd[cde];let recu=0,ec=0,pcs=0;codes.forEach(cd=>{const s=statusOf(byCode[cd]);if(s==='recu')recu++;else if(s==='ecart')ec++;pcs+=byCode[cd].pieces;});return {n:codes.length,recu,ec,pcs};}
function matchQ(c){const q=(fq||'').toLowerCase().trim();return !q||c.code.toLowerCase().includes(q)||(c.cde||'').toLowerCase().includes(q);}
function rowColis(code,flat){const c=byCode[code],st=statusOf(c),b=BADGE[st];
  const late=(st==='attendu'&&isLate(c))?' · <span class="late">depuis le '+fmtJM(c.created_at)+'</span>':'';
  return '<div class="row'+(flat?' flat':'')+(current===code?' sel':'')+'" onclick="openColis(\''+code+'\')"><span class="dot '+st+'"></span><div class="row-main"><div class="row-t">Colis '+esc(code)+'</div><div class="row-s">'+c.pieces+' pièces · '+c.art.length+' références'+late+'</div></div><span class="badge '+b[1]+'">'+b[0]+'</span></div>';}
function renderList(){
  renderKpis();
  const list=document.getElementById('list');
  if(vmode==='cmd'){
    const items=cmds.filter(cde=>byCmd[cde].some(cd=>matchQ(byCode[cd])));
    list.innerHTML=items.map(cde=>{const s=cmdStats(cde),pct=s.n?Math.round(100*(s.recu+s.ec)/s.n):0,open=openCmd===cde;
      const sub=byCmd[cde].filter(cd=>matchQ(byCode[cd])).map(cd=>rowColis(cd,false)).join('');
      return '<div class="cmd'+(open?' open':'')+'"><div class="cmd-h" onclick="toggleCmd(\''+esc(cde)+'\')"><span class="chev">▶</span><div class="cmd-main"><div class="cmd-t">Commande '+esc(cde)+'</div><div class="cmd-s">'+s.n+' colis · '+s.recu+' reçu'+(s.recu>1?'s':'')+(s.ec?' · '+s.ec+' écart'+(s.ec>1?'s':''):'')+'</div></div><div class="minibar bar"><i style="width:'+pct+'%"></i></div></div><div class="cmd-body">'+sub+'</div></div>';
    }).join('')||'<div class="empty">Aucune commande.</div>';
    document.getElementById('count').textContent=items.length+' commande'+(items.length>1?'s':'');
  }else{
    let items=COLIS.filter(c=>filter==='done'?statusOf(c)!=='attendu':statusOf(c)==='attendu').filter(matchQ);
    if(filter!=='done')items.sort((a,b)=>(a.created_at||'').localeCompare(b.created_at||''));
    const todo=COLIS.filter(c=>statusOf(c)==='attendu').length, done=COLIS.length-todo;
    list.innerHTML='<div class="seg" style="margin:0 3px 9px"><button class="'+(filter==='todo'?'on':'')+'" onclick="setFilter(\'todo\')">À traiter ('+todo+')</button><button class="'+(filter==='done'?'on':'')+'" onclick="setFilter(\'done\')">Traités ('+done+')</button></div>'
      +(items.map(c=>rowColis(c.code,true)).join('')||'<div class="empty">'+(filter==='done'?'Aucun colis traité.':'Tout est traité ✓')+'</div>');
    document.getElementById('count').textContent=items.length+' colis';
  }
}
function toggleCmd(cde){openCmd=openCmd===cde?null:cde;renderList();}
function st_(code){return state[code]=state[code]||{statut:'',note:'',ok:new Set()};}
async function persist(code){const s=st_(code);
  try{const {data,error}=await sb.rpc('mag_save',{p_code:MAG,p_hash:PINHASH,p_colis:code,p_statut:s.statut||'attendu',p_note:s.note||'',p_ok:[...s.ok]});
    if(error||data===false)flash('Sauvegarde refusée — reconnecte-toi.',true);}
  catch(e){flash('Sauvegarde impossible (réseau).',true);}
}
function openColis(code){
  current=code;const c=byCode[code];if(!c)return;
  if(byCmd[c.cde].indexOf(code)>=0)openCmd=c.cde;
  const codes=byCmd[c.cde],recuN=codes.filter(x=>statusOf(byCode[x])!=='attendu').length;
  const s=st_(code),ok=s.ok,st=statusOf(c);
  const okN=c.art.filter(a=>ok.has(a.id)).length,pct=c.art.length?Math.round(100*okN/c.art.length):0;
  const lines=c.art.map(a=>{const on=ok.has(a.id),fam=artFam(a);
    return '<div class="line'+(on?' done':'')+'" onclick="toggleLine(\''+code+'\','+a.id+')"><div class="chk">'+(on?'✓':'')+'</div><div class="line-main"><div class="line-name">'+esc(artName(a))+'</div>'+(fam?'<div class="line-fam">'+esc(fam)+'</div>':'')+'</div><div class="line-q">×'+a.qte+'</div></div>';}).join('');
  let h='<div class="d-pad"><div class="d-head"><div><div class="d-t">Colis '+esc(code)+'</div><div class="d-s">Commande '+esc(c.cde)+' · '+c.pieces+' pièces · '+c.art.length+' références</div></div><span class="badge '+BADGE[st][1]+'">'+BADGE[st][0]+'</span></div>';
  h+='<div class="callout">Commande '+esc(c.cde)+' : <b>'+recuN+' / '+codes.length+'</b> colis traités'+(recuN<codes.length?' · '+(codes.length-recuN)+' encore à traiter':' · complète ✓')+'</div>';
  h+='<div class="ctrl-h"><span class="t">Contrôle des articles</span><span class="c">'+okN+' / '+c.art.length+' pointés</span></div>';
  h+='<div class="bar" style="margin:0 2px 11px"><i style="width:'+pct+'%"></i></div>';
  h+='<div class="lines">'+lines+'</div>';
  h+='<div class="acts"><button class="btn primary big" onclick="conform(\''+code+'\')">✓ Colis conforme</button><button class="btn warn big" onclick="signalMiss(\''+code+'\')">⚠ Pièce(s) manquante(s)</button></div>';
  if(st==='ecart'){const miss=c.art.filter(a=>!ok.has(a.id));
    h+='<div class="ecart-box"><div class="et">⚠ Écart signalé — '+(miss.length?miss.length+' article(s) manquant(s)':'à préciser')+'</div>';
    if(miss.length){h+='<ul>'+miss.map(a=>'<li>'+esc(artName(a))+' · ×'+a.qte+(artFam(a)?' <span class="e-fam">'+esc(artFam(a))+'</span>':'')+'</li>').join('')+'</ul>';}
    h+='<input class="note-in" id="note-in" placeholder="Précision (facultatif) : abîmé, colis ouvert…" value="'+esc(s.note||'')+'" onchange="saveNote(\''+code+'\')">';
    h+='<div class="ecart-acts"><button class="btn warn" onclick="fluxEmail(\''+code+'\')">✉ Email service Flux</button><button class="btn" onclick="clearEcart(\''+code+'\')">Annuler l\'écart</button></div></div>';
  }
  h+='</div>';
  document.getElementById('detail').innerHTML=h;renderList();
}
function toggleLine(code,id){const s=st_(code);if(s.ok.has(id))s.ok.delete(id);else s.ok.add(id);persist(code);openColis(code);}
function conform(code){const s=st_(code);byCode[code].art.forEach(a=>s.ok.add(a.id));s.statut='recu';s.note='';persist(code);openColis(code);flash('Colis '+code+' conforme ✓');}
function signalMiss(code){const s=st_(code);s.statut='ecart';persist(code);openColis(code);
  const miss=byCode[code].art.filter(a=>!s.ok.has(a.id));
  flash(miss.length?miss.length+' article(s) signalé(s) manquant(s).':'Écart signalé — coche les articles présents pour préciser.',true);
}
function clearEcart(code){const s=st_(code);s.statut='attendu';s.note='';persist(code);openColis(code);flash('Écart annulé.');}
function saveNote(code){const s=st_(code);const el=document.getElementById('note-in');if(el){s.note=el.value.trim();persist(code);}}
function flash(m,w){const e=document.getElementById('flash');if(!e)return;e.textContent=m;e.className='flash '+(w?'warn':'ok');clearTimeout(flash._t);flash._t=setTimeout(()=>{e.textContent='';e.className='flash';},2800);}
function buildFlux(code){
  const list = code ? (statusOf(byCode[code])==='ecart'?[byCode[code]]:[]) : COLIS.filter(c=>statusOf(c)==='ecart');
  const d=new Date().toLocaleDateString('fr-FR');
  let body='Magasin '+MAG+' — Écarts réception du '+d+'\n\n';
  list.forEach(c=>{const s=state[c.code]||{ok:new Set()};const miss=c.art.filter(a=>!s.ok.has(a.id));
    body+='— Commande '+c.cde+' · Colis '+c.code+'\n';
    if(s.note)body+='  Note : '+s.note+'\n';
    if(miss.length){body+='  Articles manquants :\n';miss.forEach(a=>{body+='    • '+artName(a)+' · x'+a.qte+'   (EAN '+a.ean+')\n';});}
    body+='\n';});
  return {count:list.length, subject:'Écarts réception — Magasin '+MAG+' — '+d, body};
}
let pendingMail=null;
function fluxEmail(code){
  const f=buildFlux(code);
  if(!f.count){flash('Aucun écart à signaler.');return;}
  pendingMail='mailto:'+FLUX_EMAIL+'?subject='+encodeURIComponent(f.subject)+'&body='+encodeURIComponent(f.body);
  document.getElementById('modal-to').textContent='À : '+FLUX_EMAIL+'   ·   Objet : '+f.subject;
  document.getElementById('modal-body').textContent=f.body;
  document.getElementById('modal').classList.remove('hide');
}
function confirmEmail(){
  if(pendingMail){try{window.location.href=pendingMail;}catch(e){}}
  closeModal(); flash('Email service Flux ouvert — envoie-le depuis ta messagerie.');
}
function closeModal(){document.getElementById('modal').classList.add('hide');pendingMail=null;}
function onScan(v){v=(v||'').trim();if(!v)return;
  if(byCode[v]){openColis(v);flash('Colis '+v+' ouvert — coche les articles présents.');return;}
  if(current){const a=byCode[current].art.find(x=>x.ean===v);if(a){st_(current).ok.add(a.id);persist(current);openColis(current);flash('Article pointé ✓');return;}}
  flash('Code inconnu : '+v,true);
}
window.addEventListener('DOMContentLoaded',init);
window.__init=init;
</script>
</body>
</html>
