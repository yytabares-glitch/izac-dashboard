<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin consommables — IZAC</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0D2750; --navy2:#0C447C; --bg:#EDEFF3; --card:#fff; --line:#E5E9F2; --line2:#EEF1F6;
    --ink:#263145; --ink2:#5b647a; --ink3:#828a9c; --green:#1f9d57; --greenbg:#e6f6ed; --greenline:#bfe6cf;
    --warn:#b8860b; --warnbg:#f7efd6; --red:#D64545; --redbg:#FDECEC;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.4}
  .wrap{max-width:1080px;margin:0 auto;padding:18px 18px 80px}
  .hdr{background:var(--navy);border-radius:10px;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:14px}
  .hdr-logo{width:38px;height:38px;background:#1E4D9B;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff}
  .hdr h1{font-size:19px;font-weight:800;color:#fff}
  .hdr .sub{font-size:12px;color:rgba(255,255,255,.7);font-weight:600;margin-top:1px}
  .hdr .stat{font-size:12px;color:rgba(255,255,255,.85);text-align:right}
  .hidden{display:none!important}

  /* login */
  .gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#EDEFF3;font-family:'Hanken Grotesk',system-ui,sans-serif}
  .login{max-width:360px;width:100%;background:#fff;border:1px solid rgba(38,49,69,.06);border-radius:20px;padding:44px 40px;text-align:center;box-shadow:0 16px 56px rgba(38,49,69,.12)}
  .login .lg{width:62px;height:62px;background:#263145;border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',Georgia,serif;font-size:24px;font-weight:600;color:#fff;letter-spacing:.04em;margin:0 auto 18px}
  .login h1{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:22px;margin:0 0 6px;color:#263145}
  .login p{color:#5b647a;font-size:12px;margin:0 0 26px}
  .login input{width:100%;border:1px solid rgba(38,49,69,.10);border-radius:11px;padding:13px 15px;font-size:18px;outline:none;text-align:center;letter-spacing:.3em;font-family:'Hanken Grotesk',system-ui,sans-serif}
  .login input:focus{border-color:#263145;box-shadow:0 0 0 3px rgba(38,49,69,.08)}
  .login .btn{width:100%;margin-top:16px;padding:13px;background:#263145;color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Hanken Grotesk',system-ui,sans-serif;letter-spacing:.02em}
  .login .btn:hover{opacity:.88}
  .login .err{color:#b42318;font-size:12px;font-weight:600;margin-top:12px;min-height:14px}

  .summary{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .pill{background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px 16px;font-size:13px}
  .pill b{font-size:18px;font-variant-numeric:tabular-nums}
  .pill.ok b{color:var(--green)} .pill.ck b{color:var(--warn)}

  .art{background:#fff;border:1px solid var(--line);border-radius:9px;padding:12px 16px;margin-bottom:10px}
  .art.check{border-left:3px solid var(--warn)} .art.ok{border-left:3px solid var(--green)}
  .art-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .art-cat{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3);font-weight:700;background:var(--line2);padding:2px 8px;border-radius:99px}
  .art-lib{font-weight:600;font-size:14px;flex:1;min-width:200px}
  .art-prof{font-size:11px;color:var(--ink3);font-weight:600}
  .tag{font-size:11px;padding:2px 9px;border-radius:99px;font-weight:700}
  .tag.ok{background:var(--greenbg);color:var(--green)} .tag.ck{background:var(--warnbg);color:var(--warn)}
  .art-gencod{margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .art-gencod .cur{font-variant-numeric:tabular-nums;font-size:13px;padding:6px 10px;background:var(--line2);border-radius:6px;min-width:150px}
  .art-gencod .cur.empty{color:var(--red)}
  .srch{flex:1;min-width:200px;position:relative}
  .srch input{width:100%;padding:8px 11px;border:1px solid var(--line);border-radius:7px;font-size:13px}
  .srch input:focus{outline:none;border-color:var(--navy)}
  .results{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:8px;margin-top:4px;max-height:240px;overflow:auto;z-index:10;box-shadow:0 10px 30px rgba(13,39,80,.12);display:none}
  .results.show{display:block}
  .res{padding:8px 11px;font-size:12.5px;cursor:pointer;border-bottom:1px solid var(--line2)}
  .res:hover{background:var(--line2)}
  .res .g{font-variant-numeric:tabular-nums;font-weight:700;color:var(--navy)}
  .res .v{color:var(--ink3)}
  .btn-sm{padding:7px 12px;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer}
  .btn-clear{background:var(--line2);color:var(--ink2)}
  .btn-edit{background:#e6eefb;color:var(--navy2)}
  .saved{font-size:12px;color:var(--green);font-weight:700;opacity:0;transition:opacity .2s}
  .saved.show{opacity:1}
  .groupbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .groupbar .gl{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);font-weight:700;margin-right:2px}
  .showoff{font-size:12px;color:var(--ink2);font-weight:600;display:flex;align-items:center;gap:5px;cursor:pointer;margin-left:8px}
  .showoff input{width:15px;height:15px;accent-color:var(--navy);cursor:pointer}
  .btn-add{margin-left:auto;background:var(--navy);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer}
  .btn-add:hover{background:var(--navy2)}
  .addform{background:#fff;border:1.5px solid var(--navy);border-radius:10px;padding:16px 18px;margin-bottom:16px}
  .af-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
  .af-row:last-child{margin-bottom:0}
  .af-row input[type=text]{flex:1;min-width:180px;padding:9px 12px;border:1px solid var(--line);border-radius:7px;font-size:14px}
  .af-row input[type=text]:focus{outline:none;border-color:var(--navy)}
  .af-lab{font-size:12px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
  .af-grp{font-size:13px;color:var(--ink2);font-weight:600;display:flex;align-items:center;gap:5px;cursor:pointer}
  .af-grp input{width:16px;height:16px;accent-color:var(--navy);cursor:pointer}
  .art.inactif{opacity:.5;background:var(--line2)}
  .btn-off{background:#fbe9e4;color:var(--red)}
  .btn-on{background:var(--greenbg);color:var(--green)}
  .edit-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}
  .edit-row input[type=text]{flex:1;min-width:160px;padding:7px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px}
  .edit-row input[type=text]:focus{outline:none;border-color:var(--navy)}
  .edit-row .eg{font-size:12px;color:var(--ink2);font-weight:600;display:flex;align-items:center;gap:4px;cursor:pointer}
  .edit-row .eg input{width:15px;height:15px;accent-color:var(--navy)}
  .gchip{font-size:13px;font-weight:700;padding:7px 16px;border-radius:99px;border:1.5px solid var(--line);background:#fff;color:var(--ink2);cursor:pointer;transition:.12s}
  .gchip:hover{border-color:var(--navy);color:var(--navy)}
  .gchip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .circuit{font-size:12px;color:var(--ink2);font-weight:600;display:flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap}
  .circuit input{width:15px;height:15px;cursor:pointer;accent-color:var(--navy)}
  .seuil{font-size:12px;color:var(--ink2);font-weight:600;display:flex;align-items:center;gap:5px;white-space:nowrap}
  .seuil input{width:62px;padding:5px 7px;border:1px solid var(--line);border-radius:6px;font-size:13px;text-align:center;font-variant-numeric:tabular-nums}
  .seuil input:focus{outline:none;border-color:var(--navy)}
  .tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid var(--line)}
  .tab{background:none;border:none;padding:10px 18px;font-size:14px;font-weight:700;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
  .tab:hover{color:var(--navy)}
  .tab.active{color:var(--navy);border-bottom-color:var(--navy)}
  .suivi-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .vchip{font-size:13px;font-weight:700;padding:7px 15px;border-radius:99px;border:1.5px solid var(--line);background:#fff;color:var(--ink2);cursor:pointer}
  .vchip:hover{border-color:var(--navy);color:var(--navy)}
  .vchip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .vexport{background:var(--greenbg);color:var(--green);border-color:var(--greenline)}
  .vexport:hover{background:#d5f0e0;color:var(--green);border-color:var(--green)}
  .suivi-info{font-size:12px;color:var(--ink3);margin-left:auto}
  .suivi-empty{text-align:center;color:var(--ink3);padding:40px;font-size:14px}
  .stbl{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .stbl th,.stbl td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--line2)}
  .stbl th{background:var(--line2);font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink3);font-weight:700;position:sticky;top:0}
  .stbl td.num,.stbl th.num{text-align:right;font-variant-numeric:tabular-nums}
  .stbl tbody tr:hover{background:var(--line2)}
  .scrollbox{max-height:520px;overflow:auto;border-radius:8px}
  .cmd-card{background:#fff;border:1px solid var(--line);border-radius:9px;padding:12px 16px;margin-bottom:10px}
  .cmd-head{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:13px;border-bottom:1px solid var(--line2);padding-bottom:8px;margin-bottom:8px}
  .cmd-head b{color:var(--navy)} .cmd-meta{color:var(--ink3)}
  .cmd-line{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}
  .cmd-line .q{font-weight:700;font-variant-numeric:tabular-nums}
  .hot{color:var(--red);font-weight:800}
  .cnt{background:rgba(255,255,255,.25);border-radius:99px;padding:1px 7px;font-size:11px;margin-left:3px}
  .vchip:not(.active) .cnt{background:var(--line);color:var(--ink2)}
  .cmd-card.todo{border-left:3px solid var(--warn)}
  .cmd-card.done{border-left:3px solid var(--green);opacity:.82}
  .cmd-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--line2)}
  .cmd-actions .btn-dl{background:var(--navy);color:#fff;border:none;border-radius:7px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer}
  .cmd-actions .btn-dl:hover{background:var(--navy2)}
  .cmd-actions .btn-redo{background:var(--line2);color:var(--ink2);border:none;border-radius:7px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer}
  .cmd-actions .chk{font-size:13px;color:var(--ink2);font-weight:600;display:flex;align-items:center;gap:6px;cursor:pointer}
  .cmd-actions .chk input{width:17px;height:17px;accent-color:var(--green);cursor:pointer}
  .cmd-statut{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px}
  .cmd-statut.todo{background:var(--warnbg);color:var(--warn)}
  .cmd-statut.done{background:var(--greenbg);color:var(--green)}
  .badge-siege{font-size:10px;background:#ede4f7;color:#7a4ba8;padding:1px 7px;border-radius:99px;margin-left:6px;font-weight:700}
</style>
</head>
<body>

<div id="gate" class="gate">
  <div class="login">
    <div class="lg">IZ</div>
    <h1>Admin consommables</h1>
    <p>Accès réservé — code PIN du siège.</p>
    <input id="pin-in" type="password" inputmode="numeric" placeholder="••••" maxlength="12">
    <button class="btn" id="loginBtn">Entrer</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div class="wrap hidden" id="app">
  <div class="hdr">
    <div class="brand"><div class="hdr-logo">IZ</div><div><h1>Admin consommables</h1><div class="sub">Validation des références (gencod)</div></div></div>
    <div class="stat"><a href="consommables.html" style="color:#fff">← Page magasin</a></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="refs">Références</button>
    <button class="tab" data-tab="suivi">Suivi des commandes</button>
  </div>

  <div id="tab-refs">
  <div class="summary">
    <div class="pill ok">Validés <b id="nOk">0</b></div>
    <div class="pill ck">À vérifier <b id="nCheck">0</b></div>
    <div class="pill">Total <b id="nTot">0</b></div>
  </div>

  <div class="groupbar" id="groupbar">
    <span class="gl">Groupe :</span>
    <button class="gchip active" data-grp="ALL">Tout</button>
    <button class="gchip" data-grp="R">Réseau</button>
    <button class="gchip" data-grp="O">Outlet</button>
    <button class="gchip" data-grp="A">Affilié</button>
    <label class="showoff"><input type="checkbox" id="showInactifs"> afficher les désactivés</label>
    <button class="btn-add" id="addBtn">+ Ajouter une référence</button>
  </div>

  <div id="addForm" class="addform hidden">
    <div class="af-row">
      <input type="text" id="afLib" placeholder="Nom de l'article (ex. Sac petit modèle)">
      <input type="text" id="afCat" placeholder="Catégorie (ex. Sacherie)" list="catList">
      <datalist id="catList"></datalist>
    </div>
    <div class="af-row">
      <span class="af-lab">Groupes :</span>
      <label class="af-grp"><input type="checkbox" id="afR" checked> Réseau</label>
      <label class="af-grp"><input type="checkbox" id="afO"> Outlet</label>
      <label class="af-grp"><input type="checkbox" id="afA"> Affilié</label>
      <button class="btn-add" id="afSave">Créer</button>
      <button class="btn-sm btn-clear" id="afCancel">Annuler</button>
    </div>
  </div>

  <div id="list"></div>
  </div>

  <div id="tab-suivi" class="hidden">
    <div class="suivi-controls">
      <button class="vchip active" data-vue="atraiter">📋 À traiter <span class="cnt" id="cntAtraiter"></span></button>
      <button class="vchip" data-vue="termine">✓ Terminées <span class="cnt" id="cntTermine"></span></button>
      <button class="vchip" data-vue="tout">Tout</button>
      <span style="width:1px;height:24px;background:var(--line);margin:0 2px"></span>
      <button class="vchip" data-vue="totaux">Totaux/magasin</button>
      <button class="vchip" data-vue="abus">Alertes</button>
      <button class="vchip" data-vue="rythme">Rythme</button>
      <button class="vchip vexport" id="exportBtn">⬇ Export Excel</button>
      <span class="suivi-info" id="suiviInfo"></span>
    </div>
    <div id="suiviContent"><div class="suivi-empty">Chargement…</div></div>
  </div>
</div>

// ---- login ----
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}
async function doLogin(){
  const pin=(document.getElementById('pin-in').value||'').trim();
  const err=document.getElementById('loginErr');
  if(!pin){err.textContent='Entre le code PIN.';return;}
  const btn=document.getElementById('loginBtn'); btn.disabled=true; err.textContent='';
  try{
    const hash=await sha256(pin);
    const {data,error}=await sb.rpc('conso_login',{p_hash:hash});
    if(error){err.textContent='Erreur de connexion.';btn.disabled=false;return;}
    if(data&&data.ok){document.getElementById('gate').style.display='none';document.getElementById('app').classList.remove('hidden');loadArts();return;}
    if(data&&data.locked)err.textContent='Trop d\'essais. Réessaie dans '+(data.wait||15)+' min.';
    else if(data&&typeof data.left==='number')err.textContent='PIN incorrect — '+data.left+' essai(s) restant(s).';
    else err.textContent='PIN incorrect.';
    btn.disabled=false;
  }catch(e){err.textContent='Erreur : '+(e.message||e);btn.disabled=false;}
}
document.getElementById('loginBtn').addEventListener('click',doLogin);
document.getElementById('pin-in').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('pin-in').focus();

// ---- articles ----
async function loadArts(){
  const {data,error}=await sb.from('conso_articles').select('*').order('ordre');
  if(error){document.getElementById('list').innerHTML='Erreur : '+error.message;return;}
  ARTS=data; render();
}
let groupFilter='ALL', showInactifs=false;
const PROF={R:'Réseau',O:'Outlet',A:'Affilié'};

function visibleArts(){
  return ARTS.filter(a=>{
    if(!showInactifs && a.actif===false) return false;
    if(groupFilter!=='ALL' && !a.profils.split(',').includes(groupFilter)) return false;
    return true;
  });
}
function updateCounters(){
  const shown=visibleArts();
  const ok=shown.filter(a=>a.gencod && a.statut==='ok').length;
  document.getElementById('nOk').textContent=ok;
  document.getElementById('nCheck').textContent=shown.length-ok;
  document.getElementById('nTot').textContent=shown.length;
}
function render(){
  updateCounters();
  const shown=visibleArts();
  document.getElementById('list').innerHTML=shown.map(a=>{
    const valid=a.gencod && a.statut==='ok';
    const profs=a.profils.split(',').map(p=>PROF[p]).join(' · ');
    const siege=a.circuit==='siege';
    const inactif=a.actif===false;
    return `<div class="art ${inactif?'inactif':(valid?'ok':'check')}" data-id="${a.id}">
      <div class="art-head">
        <span class="art-cat">${a.categorie}</span>
        <span class="art-lib">${a.libelle}</span>
        <span class="art-prof">${profs}</span>
        <label class="circuit"><input type="checkbox" data-siege="${a.id}" ${siege?'checked':''}> préparé au siège</label>
        <label class="seuil">Plafond/cmd <input type="number" min="0" data-seuil="${a.id}" value="${a.seuil_alerte!=null?a.seuil_alerte:''}" placeholder="—"></label>
        <span class="tag ${valid?'ok':'ck'}">${valid?'validé':'à vérifier'}</span>
      </div>
      <div class="art-gencod">
        <span class="cur ${a.gencod?'':'empty'}" id="cur-${a.id}">${a.gencod||'aucun gencod'}</span>
        <div class="srch" id="srch-${a.id}" style="${valid?'display:none':''}">
          <input type="text" placeholder="Rechercher un article (nom, réf, gencod)…" data-search="${a.id}">
          <div class="results" id="res-${a.id}"></div>
        </div>
        ${valid?`<button class="btn-sm btn-edit" data-editgc="${a.id}">Changer gencod</button>`:''}
        ${a.gencod?`<button class="btn-sm btn-clear" data-clear="${a.id}">Vider</button>`:''}
        <button class="btn-sm btn-edit" data-editart="${a.id}">Modifier l'article</button>
        <button class="btn-sm ${inactif?'btn-on':'btn-off'}" data-toggle="${a.id}">${inactif?'Réactiver':'Désactiver'}</button>
        <span class="saved" id="saved-${a.id}">enregistré ✓</span>
      </div>
      <div class="edit-row hidden" id="edit-${a.id}">
        <input type="text" data-elib="${a.id}" value="${a.libelle.replace(/"/g,'&quot;')}" placeholder="Nom">
        <input type="text" data-ecat="${a.id}" value="${a.categorie.replace(/"/g,'&quot;')}" placeholder="Catégorie" list="catList">
        <label class="eg"><input type="checkbox" data-eg="${a.id}" value="R" ${a.profils.includes('R')?'checked':''}> R</label>
        <label class="eg"><input type="checkbox" data-eg="${a.id}" value="O" ${a.profils.includes('O')?'checked':''}> O</label>
        <label class="eg"><input type="checkbox" data-eg="${a.id}" value="A" ${a.profils.includes('A')?'checked':''}> A</label>
        <button class="btn-sm btn-add" data-esave="${a.id}">Enregistrer</button>
        <button class="btn-sm btn-clear" data-ecancel="${a.id}">Annuler</button>
      </div>
    </div>`;
  }).join('');
  // remplir la datalist des catégories
  const cats=[...new Set(ARTS.map(a=>a.categorie))];
  const dl=document.getElementById('catList'); if(dl) dl.innerHTML=cats.map(c=>`<option value="${c}">`).join('');
}

// ---- délégation d'événements (robuste, survit aux re-render) ----
const listEl=document.getElementById('list');
listEl.addEventListener('input',e=>{
  const inp=e.target.closest('input[data-search]'); if(!inp) return;
  const id=inp.dataset.search, q=inp.value.trim().toLowerCase();
  const box=document.getElementById('res-'+id);
  if(q.length<2){box.classList.remove('show');return;}
  const hits=REF.filter(r=>(r.g+' '+r.r+' '+r.l+' '+r.v).toLowerCase().includes(q)).slice(0,30);
  box.innerHTML=hits.map(r=>`<div class="res" data-pick="${id}" data-g="${r.g}"><span class="g">${r.g}</span> · ${r.l} <span class="v">${r.v||''}</span> <span class="v">[${r.r}]</span></div>`).join('')||'<div class="res" style="color:var(--ink3)">aucun résultat</div>';
  box.classList.add('show');
});
// mousedown sur résultat = AVANT le blur, donc validation fiable
listEl.addEventListener('mousedown',e=>{
  const res=e.target.closest('.res[data-g]'); if(!res) return;
  e.preventDefault();
  setGencod(res.dataset.pick, res.dataset.g);
  const box=document.getElementById('res-'+res.dataset.pick); if(box) box.classList.remove('show');
});
listEl.addEventListener('click',e=>{
  const clr=e.target.closest('[data-clear]'); if(clr){ setGencod(clr.dataset.clear,''); return; }
  const cb=e.target.closest('input[data-siege]'); if(cb){ setCircuit(cb.dataset.siege, cb.checked?'siege':'depot'); return; }
  const ed=e.target.closest('[data-editgc]'); if(ed){
    const s=document.getElementById('srch-'+ed.dataset.editgc);
    if(s){ s.style.display=''; const i=s.querySelector('input'); if(i){i.value='';i.focus();} }
    ed.remove(); return;
  }
  // ouvrir l'édition de l'article
  const ea=e.target.closest('[data-editart]'); if(ea){
    const row=document.getElementById('edit-'+ea.dataset.editart);
    if(row) row.classList.toggle('hidden'); return;
  }
  // annuler l'édition
  const ec=e.target.closest('[data-ecancel]'); if(ec){
    const row=document.getElementById('edit-'+ec.dataset.ecancel); if(row) row.classList.add('hidden'); return;
  }
  // enregistrer l'édition
  const es=e.target.closest('[data-esave]'); if(es){ saveArticle(es.dataset.esave); return; }
  // désactiver / réactiver
  const tg=e.target.closest('[data-toggle]'); if(tg){ toggleActif(tg.dataset.toggle); return; }
});

document.addEventListener('mousedown',e=>{

});
// enregistrer le seuil par article
listEl.addEventListener('change',e=>{
  const s=e.target.closest('input[data-seuil]'); if(!s) return;
  const v=s.value.trim()===''?null:parseInt(s.value,10);
  setSeuil(s.dataset.seuil, (v!=null && v>=0)?v:null);
});
async function setSeuil(id,seuil){
  const {error}=await sb.from('conso_articles').update({seuil_alerte:seuil}).eq('id',id);
  if(error){alert('Erreur : '+error.message);return;}
  const art=ARTS.find(a=>String(a.id)===String(id)); if(art) art.seuil_alerte=seuil;
  const sv=document.getElementById('saved-'+id); if(sv){sv.classList.add('show'); setTimeout(()=>sv.classList.remove('show'),1500);}
}

async function saveArticle(id){
  const lib=document.querySelector(`[data-elib="${id}"]`).value.trim();
  const cat=document.querySelector(`[data-ecat="${id}"]`).value.trim();
  const grps=[...document.querySelectorAll(`[data-eg="${id}"]:checked`)].map(c=>c.value);
  if(!lib){ alert('Le nom ne peut pas être vide.'); return; }
  if(!grps.length){ alert('Sélectionne au moins un groupe (R/O/A).'); return; }
  const profils=grps.join(',');
  const {error}=await sb.from('conso_articles').update({libelle:lib,categorie:cat||'Divers',profils}).eq('id',id);
  if(error){ alert('Erreur : '+error.message); return; }
  const art=ARTS.find(a=>String(a.id)===String(id)); if(art){art.libelle=lib;art.categorie=cat||'Divers';art.profils=profils;}
  render();
}
async function toggleActif(id){
  const art=ARTS.find(a=>String(a.id)===String(id)); if(!art) return;
  const next=!(art.actif===false)?false:true; // si actif -> false, sinon -> true
  const {error}=await sb.from('conso_articles').update({actif:next}).eq('id',id);
  if(error){ alert('Erreur : '+error.message); return; }
  art.actif=next; render();
}
async function addArticle(){
  const lib=document.getElementById('afLib').value.trim();
  const cat=document.getElementById('afCat').value.trim()||'Divers';
  const grps=['R','O','A'].filter(g=>document.getElementById('af'+g).checked);
  if(!lib){ alert('Donne un nom à l\'article.'); return; }
  if(!grps.length){ alert('Sélectionne au moins un groupe.'); return; }
  const maxOrdre=Math.max(0,...ARTS.map(a=>a.ordre||0));
  const {data,error}=await sb.from('conso_articles')
    .insert({ordre:maxOrdre+1,categorie:cat,libelle:lib,gencod:'',statut:'check',profils:grps.join(','),circuit:'depot',actif:true})
    .select().single();
  if(error){ alert('Erreur : '+error.message); return; }
  ARTS.push(data);
  document.getElementById('afLib').value=''; document.getElementById('afCat').value='';
  document.getElementById('addForm').classList.add('hidden');
  render();
}
document.getElementById('addBtn').addEventListener('click',()=>document.getElementById('addForm').classList.toggle('hidden'));
document.getElementById('afCancel').addEventListener('click',()=>document.getElementById('addForm').classList.add('hidden'));
document.getElementById('afSave').addEventListener('click',addArticle);
document.getElementById('showInactifs').addEventListener('change',e=>{ showInactifs=e.target.checked; render(); });

async function setGencod(id,g){
  const statut=g?'ok':'check';
  const {error}=await sb.from('conso_articles').update({gencod:g,statut}).eq('id',id);
  if(error){alert('Erreur : '+error.message);return;}
  const art=ARTS.find(a=>String(a.id)===String(id)); if(art){art.gencod=g;art.statut=statut;}
  render();  // re-render complet : champ caché si validé, vidé, statut à jour
  const sv=document.getElementById('saved-'+id); if(sv){sv.classList.add('show'); setTimeout(()=>sv.classList.remove('show'),1500);}
}
async function setCircuit(id,circuit){
  const {error}=await sb.from('conso_articles').update({circuit}).eq('id',id);
  if(error){alert('Erreur : '+error.message);return;}
  const art=ARTS.find(a=>String(a.id)===String(id)); if(art) art.circuit=circuit;
}

let CMDS=null, CMDLIGNES=null, MAGS_ALL=[];
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));
  const tab=t.dataset.tab;
  document.getElementById('tab-refs').classList.toggle('hidden',tab!=='refs');

async function loadSuivi(){
  document.getElementById('suiviContent').innerHTML='<div class="suivi-empty">Chargement des commandes…</div>';
  try{
    const [c,l]=await Promise.all([
      sb.from('conso_commandes').select('*').order('created_at',{ascending:false}),
      sb.from('conso_commande_lignes').select('*')
    ]);
    if(c.error) throw c.error; if(l.error) throw l.error;
    CMDS=c.data; CMDLIGNES=l.data;
    if(!MAGS_ALL.length){ const m=await sb.from('conso_magasins').select('*'); if(!m.error) MAGS_ALL=m.data; }
    document.getElementById('suiviInfo').textContent=`${CMDS.length} commande(s) au total`;
    updateSuiviCounts();
    renderSuivi('atraiter');
  }catch(e){ document.getElementById('suiviContent').innerHTML='<div class="suivi-empty">Erreur : '+e.message+'</div>'; }
}
function updateSuiviCounts(){
  const todo=CMDS.filter(c=>(c.statut||'a_traiter')!=='termine').length;
  const done=CMDS.length-todo;
  const a=document.getElementById('cntAtraiter'), t=document.getElementById('cntTermine');
  if(a) a.textContent=todo; if(t) t.textContent=done;
}
let suiviVue='atraiter';
document.querySelector('.suivi-controls').addEventListener('click',e=>{
  const ch=e.target.closest('.vchip'); if(!ch || ch.id==='exportBtn') return;
  suiviVue=ch.dataset.vue;
  document.querySelectorAll('.vchip:not(.vexport)').forEach(c=>c.classList.toggle('active',c===ch));
  renderSuivi(suiviVue);
});
document.getElementById('exportBtn').addEventListener('click',exportExcel);
function exportExcel(){
  if(!CMDS||!CMDS.length){ alert('Aucune commande à exporter.'); return; }
  const rows=[['N° commande','Date','Magasin','Type','Demandeur','Article','Circuit','Quantité','Gencod','Justification']];
  const PROFL={R:'Réseau',O:'Outlet',A:'Affilié'};
  CMDS.forEach(c=>{
    const d=new Date(c.created_at).toLocaleString('fr-FR');
    linesOf(c.id).forEach(l=>{
      rows.push([c.numero||c.id, d, c.mag_nom, PROFL[c.mag_type]||c.mag_type,
        `${c.demandeur_prenom||''} ${c.demandeur_nom||''}`.trim(), l.libelle,
        l.circuit==='siege'?'Siège':'Dépôt', l.quantite, l.gencod||'', c.justification||'']);
    });
  });
  const csv=rows.map(r=>r.map(v=>{const s=String(v).replace(/"/g,'""'); return /[;"\n]/.test(s)?`"${s}"`:s;}).join(';')).join('\r\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}); // BOM pour Excel
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='suivi_consommables_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  URL.revokeObjectURL(url);
}
function linesOf(cmdId){ return CMDLIGNES.filter(l=>String(l.commande_id)===String(cmdId)); }

// ---- actions du poste de travail assistant ----
document.getElementById('suiviContent').addEventListener('click',async e=>{
  const dl=e.target.closest('[data-dl]'); if(dl){ downloadTxt(dl.dataset.dl); return; }
  const dn=e.target.closest('[data-done]'); if(dn){ await setStatut(dn.dataset.done,'termine'); return; }
  const ro=e.target.closest('[data-redo]'); if(ro){ await setStatut(ro.dataset.redo,'a_traiter'); return; }
});
document.getElementById('suiviContent').addEventListener('change',async e=>{
  const cb=e.target.closest('[data-siegepret]'); if(cb){ await setSiegePret(cb.dataset.siegepret, cb.checked); }
});
function downloadTxt(cid){
  const c=CMDS.find(x=>String(x.id)===String(cid)); if(!c) return;
  const depot=linesOf(cid).filter(l=>l.circuit!=='siege' && l.gencod);
  if(!depot.length){ alert('Aucune ligne dépôt avec gencod dans cette commande.'); return; }
  const txt=depot.map(l=>`${l.gencod}\t${l.quantite}\t\t`).join('\r\n')+'\r\n';
  const fname=(c.mag_nom||'commande').replace(/[^A-Za-z0-9_-]/g,'_')+'.txt';
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=fname; a.click(); URL.revokeObjectURL(url);
  // télécharger marque la commande comme terminée
  setStatut(cid,'termine');
}
async function setStatut(cid,statut){
  const patch={statut}; if(statut==='termine') patch.traite_at=new Date().toISOString();
  const {error}=await sb.from('conso_commandes').update(patch).eq('id',cid);
  if(error){ alert('Erreur : '+error.message); return; }
  const c=CMDS.find(x=>String(x.id)===String(cid)); if(c){c.statut=statut; if(statut==='termine')c.traite_at=patch.traite_at;}
  updateSuiviCounts(); renderSuivi(suiviVue);
}
async function setSiegePret(cid,val){
  const {error}=await sb.from('conso_commandes').update({siege_pret:val}).eq('id',cid);
  if(error){ alert('Erreur : '+error.message); return; }
  const c=CMDS.find(x=>String(x.id)===String(cid)); if(c) c.siege_pret=val;
}

function renderSuivi(vue){
  const box=document.getElementById('suiviContent');
  if(!CMDS || !CMDS.length){ box.innerHTML='<div class="suivi-empty">Aucune commande enregistrée pour le moment.</div>'; return; }

  if(vue==='atraiter' || vue==='termine' || vue==='tout'){
    let list=CMDS;
    if(vue==='atraiter') list=CMDS.filter(c=>(c.statut||'a_traiter')!=='termine');
    else if(vue==='termine') list=CMDS.filter(c=>(c.statut||'a_traiter')==='termine');
    if(!list.length){ box.innerHTML='<div class="suivi-empty">'+(vue==='atraiter'?'🎉 Rien à traiter, tout est à jour !':'Aucune commande ici.')+'</div>'; return; }
    box.innerHTML=list.map(c=>{
      const ls=linesOf(c.id);
      const depot=ls.filter(l=>l.circuit!=='siege'), siege=ls.filter(l=>l.circuit==='siege');
      const done=(c.statut||'a_traiter')==='termine';
      const d=new Date(c.created_at).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
      const hasDepot=depot.length>0, hasSiege=siege.length>0;
      return `<div class="cmd-card ${done?'done':'todo'}" data-cid="${c.id}">
        <div class="cmd-head">
          <span><b>${c.mag_nom}</b> · ${({R:'Réseau',O:'Outlet',A:'Affilié'})[c.mag_type]||c.mag_type} <span class="cmd-statut ${done?'done':'todo'}">${done?'Terminé':'À traiter'}</span></span>
          <span class="cmd-meta">${c.numero||''} · ${c.demandeur_prenom||''} ${c.demandeur_nom||''} · ${d}</span>
        </div>
        ${ls.map(l=>`<div class="cmd-line"><span>${l.libelle}${l.circuit==='siege'?'<span class="badge-siege">siège</span>':''}</span><span class="q">${l.quantite}</span></div>`).join('')}
        ${c.justification?`<div class="cmd-line" style="color:var(--warn)"><span>⚠️ Justification : ${c.justification}</span></div>`:''}
        <div class="cmd-actions">
          ${hasDepot?`<button class="btn-dl" data-dl="${c.id}">⬇ Télécharger TXT (dépôt)</button>`:'<span class="cmd-meta">— pas de partie dépôt —</span>'}
          ${hasSiege?`<label class="chk"><input type="checkbox" data-siegepret="${c.id}" ${c.siege_pret?'checked':''}> siège préparé</label>`:''}
          ${done?`<button class="btn-redo" data-redo="${c.id}">↩ rouvrir</button>`:`<button class="btn-redo" data-done="${c.id}">✓ marquer terminé</button>`}
        </div>
      </div>`;
    }).join('');
  }
  else if(vue==='totaux'){
    // tableau magasin x total articles + total quantité
    const byMag={};
    CMDS.forEach(c=>{ byMag[c.mag_code]=byMag[c.mag_code]||{nom:c.mag_nom,type:c.mag_type,nbCmd:0,qte:0}; byMag[c.mag_code].nbCmd++; });
    CMDLIGNES.forEach(l=>{ const c=CMDS.find(x=>String(x.id)===String(l.commande_id)); if(c&&byMag[c.mag_code]) byMag[c.mag_code].qte+=l.quantite; });
    const rows=Object.entries(byMag).sort((a,b)=>b[1].qte-a[1].qte);
    box.innerHTML=`<div class="scrollbox"><table class="stbl"><thead><tr><th>Magasin</th><th>Type</th><th class="num">Commandes</th><th class="num">Qté totale</th></tr></thead><tbody>`+
      rows.map(([code,m])=>`<tr><td>${m.nom}</td><td>${({R:'Réseau',O:'Outlet',A:'Affilié'})[m.type]}</td><td class="num">${m.nbCmd}</td><td class="num">${m.qte.toLocaleString('fr-FR')}</td></tr>`).join('')+
      `</tbody></table></div>`;
  }
  else if(vue==='abus'){
    // article x magasin : quantités cumulées, tri décroissant ; mise en évidence des plus gros
    const agg={};
    CMDLIGNES.forEach(l=>{
      const c=CMDS.find(x=>String(x.id)===String(l.commande_id)); if(!c) return;
      const key=l.libelle+'|||'+c.mag_nom;
      agg[key]=agg[key]||{lib:l.libelle,mag:c.mag_nom,qte:0,n:0};
      agg[key].qte+=l.quantite; agg[key].n++;
    });
    const rows=Object.values(agg).sort((a,b)=>b.qte-a.qte);
    // seuil "abus" = au-dessus du 90e percentile des quantités
    const qs=rows.map(r=>r.qte).sort((a,b)=>a-b);
    const p90=qs.length?qs[Math.floor(qs.length*0.9)]:0;
    box.innerHTML=`<div class="suivi-info" style="margin:0 0 10px">Cumul par article × magasin. En rouge : quantités anormalement élevées (top 10%).</div>
      <div class="scrollbox"><table class="stbl"><thead><tr><th>Article</th><th>Magasin</th><th class="num">Cmd</th><th class="num">Qté cumulée</th></tr></thead><tbody>`+
      rows.map(r=>`<tr><td>${r.lib}</td><td>${r.mag}</td><td class="num">${r.n}</td><td class="num ${r.qte>=p90&&r.qte>0?'hot':''}">${r.qte.toLocaleString('fr-FR')}</td></tr>`).join('')+
      `</tbody></table></div>`;
  }
  else if(vue==='rythme'){
    const byMag={};
    CMDS.forEach(c=>{ const m=byMag[c.mag_code]=byMag[c.mag_code]||{nom:c.mag_nom,type:c.mag_type,dates:[]}; m.dates.push(new Date(c.created_at)); });
    const actifs=new Set(Object.keys(byMag));
    const inactifs=MAGS_ALL.filter(m=>!actifs.has(m.code));
    const now=new Date();
    const rows=Object.entries(byMag).map(([code,m])=>{
      const last=new Date(Math.max(...m.dates.map(d=>d.getTime())));
      const first=new Date(Math.min(...m.dates.map(d=>d.getTime())));
      const joursDepuis=Math.floor((now-last)/86400000);
      const span=Math.max(1,(now-first)/604800000);
      return {nom:m.nom,type:m.type,n:m.dates.length,last,joursDepuis,parSem:m.dates.length/span};
    }).sort((a,b)=>b.parSem-a.parSem);
    box.innerHTML=`<div class="suivi-info" style="margin:0 0 10px">Fréquence de commande. En rouge : plus d'1 commande/semaine (sur-commande possible).</div>
      <div class="scrollbox"><table class="stbl"><thead><tr><th>Magasin</th><th>Type</th><th class="num">Cmd</th><th class="num">/sem.</th><th class="num">Dernière</th><th class="num">Il y a</th></tr></thead><tbody>`+
      rows.map(r=>`<tr><td>${r.nom}</td><td>${PROF[r.type]}</td><td class="num">${r.n}</td><td class="num ${r.parSem>1?'hot':''}">${r.parSem.toFixed(1)}</td><td class="num">${r.last.toLocaleDateString('fr-FR')}</td><td class="num">${r.joursDepuis} j</td></tr>`).join('')+
      (inactifs.length?`<tr><td colspan="6" style="background:var(--warnbg);font-weight:700;color:var(--warn)">${inactifs.length} magasin(s) sans commande : ${inactifs.map(m=>m.nom).join(', ')}</td></tr>`:'')+
      `</tbody></table></div>`;
  }
}
</script>
</body>
</html>
