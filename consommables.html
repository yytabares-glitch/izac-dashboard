<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commande consommables — IZAC</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --navy:#0D2750; --navy2:#0C447C; --bg:#EDEFF3; --card:#fff; --line:#E5E9F2; --line2:#EEF1F6;
    --ink:#263145; --ink2:#5b647a; --ink3:#828a9c; --green:#1f9d57; --greenbg:#e6f6ed; --red:#D64545; --redbg:#FDECEC;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.4}
  .wrap{max-width:920px;margin:0 auto;padding:18px 18px 120px}
  .hdr{background:var(--navy);border-radius:10px;padding:16px 22px;display:flex;align-items:center;gap:14px;margin-bottom:16px}
  .hdr-logo{width:38px;height:38px;background:#1E4D9B;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff}
  .hdr h1{font-size:19px;font-weight:800;color:#fff}
  .hdr .sub{font-size:12px;color:rgba(255,255,255,.7);font-weight:600;margin-top:1px}
  .note{background:#fff;border:1px solid var(--line);border-left:3px solid var(--navy);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--ink2);margin-bottom:16px}
  .selectbar{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:16px}
  .searchmag{margin-bottom:16px}
  .searchmag input{width:100%;padding:14px 16px;border:1px solid var(--line);border-radius:10px;font-size:16px;background:#fff;color:var(--ink)}
  .searchmag input:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(13,39,80,.08)}
  .maggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
  .magcard{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px;cursor:pointer;transition:.12s;text-align:left}
  .magcard:hover{border-color:var(--navy);box-shadow:0 4px 14px rgba(13,39,80,.1);transform:translateY(-1px)}
  .magcard .mn{font-weight:700;font-size:15px;color:var(--navy)}
  .magcard .mt{font-size:11px;color:var(--ink3);margin-top:3px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  .maggrid .none{grid-column:1/-1;text-align:center;color:var(--ink3);padding:30px;font-size:14px}
  .magbar{background:var(--navy);border-radius:10px;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .magbar-info{display:flex;flex-direction:column}
  .magbar-lab{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:rgba(255,255,255,.6);font-weight:700}
  .magbar-nom{font-size:17px;font-weight:800;color:#fff}
  .magbar-change{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer}
  .magbar-change:hover{background:rgba(255,255,255,.28)}
  .window-info{font-size:13px;font-weight:600;border-radius:8px;padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .window-info.open{background:var(--greenbg);color:var(--green)}
  .window-info.closed{background:var(--warnbg);color:var(--warn)}
  .reorder{background:#e6eefb;border:1px solid #c5d6f5;border-radius:9px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .reorder span{font-size:13px;color:var(--navy2);font-weight:600}
  .reorder button{background:var(--navy);color:#fff;border:none;border-radius:7px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer}
  .selectbar label{display:block;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);font-weight:700;margin-bottom:6px}
  .selectbar select{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:8px;font-size:15px;background:#fff;color:var(--ink)}
  .selectbar select:focus{outline:none;border-color:var(--navy)}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;margin-left:8px}
  .badge.R{background:#e6eefb;color:var(--navy2)} .badge.O{background:#fdeee0;color:#b8860b} .badge.A{background:var(--greenbg);color:var(--green)}
  .loading{text-align:center;color:var(--ink2);padding:40px}
  .loading .sp{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hidden{display:none!important}
  .cat{margin-top:18px}
  .cat h3{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--navy);font-weight:800;padding:0 4px 8px;border-bottom:2px solid var(--navy);margin-bottom:4px}
  .item{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:11px 14px;margin-top:8px}
  .item .lib{flex:1;font-size:14px}
  .item .warn{font-size:11px;color:var(--red);font-weight:600;margin-top:2px}
  .item .qty{width:88px}
  .item .qty input{width:100%;padding:9px;border:1px solid var(--line);border-radius:7px;font-size:15px;text-align:center;font-variant-numeric:tabular-nums}
  .item .qty input:focus{outline:none;border-color:var(--navy)}
  .item.filled{border-color:var(--navy);background:#f7faff}
  .footer-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;box-shadow:0 -4px 20px rgba(13,39,80,.06)}
  .footer-bar .recap{font-size:13px;color:var(--ink2)}
  .footer-bar .recap b{color:var(--navy);font-size:16px}
  .btn{background:var(--navy);color:#fff;border:none;border-radius:9px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer}
  .btn:hover{background:var(--navy2)} .btn:disabled{opacity:.4;cursor:default}
  .empty{text-align:center;color:var(--ink3);padding:50px 20px;font-size:14px}
  .overlay{position:fixed;inset:0;background:rgba(13,39,80,.45);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}
  .overlay.show{display:flex}
  .modal{background:#fff;border-radius:14px;max-width:540px;width:100%;max-height:88vh;overflow:auto;padding:26px 28px;box-shadow:0 20px 60px rgba(13,39,80,.3)}
  .modal h2{font-size:19px;font-weight:800;color:var(--navy);margin-bottom:6px}
  .modal-mag{font-size:13px;color:var(--ink2);font-weight:600;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line)}
  .modal-list{margin-bottom:18px}
  .ml-cat{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);font-weight:700;margin:12px 0 4px}
  .ml-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line2);font-size:14px}
  .ml-row .q{font-weight:700;font-variant-numeric:tabular-nums}
  .ml-row .badge-s{font-size:10px;background:var(--warnbg);color:var(--warn);padding:1px 7px;border-radius:99px;margin-left:6px;font-weight:700}
  .modal-form{display:flex;gap:12px;margin-bottom:14px}
  .modal-form .ff{flex:1}
  .modal-form label{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);font-weight:700;margin-bottom:5px}
  .modal-form input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px}
  .modal-form input:focus{outline:none;border-color:var(--navy)}
  .modal-check{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink2);font-weight:600;cursor:pointer;margin-bottom:14px}
  .modal-check input{width:17px;height:17px;accent-color:var(--navy);cursor:pointer}
  .alert-box{background:var(--warnbg);color:var(--warn);border-radius:8px;padding:11px 14px;font-size:13px;font-weight:600;margin-bottom:14px;line-height:1.6}
  .just-wrap{margin-bottom:14px}
  .just-wrap label{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--warn);font-weight:700;margin-bottom:5px}
  .just-wrap textarea{width:100%;padding:10px 12px;border:1px solid var(--warnbg);border-radius:8px;font-size:14px;font-family:inherit;resize:vertical}
  .just-wrap textarea:focus{outline:none;border-color:var(--warn)}
  .modal-err{color:var(--red);font-size:12.5px;font-weight:600;min-height:14px;margin-bottom:8px}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px}
  .modal-actions button{padding:11px 20px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;border:none}
  .btn-close{background:var(--line2);color:var(--ink2)}
  .btn-close:hover{background:var(--line)}
  .btn:disabled{opacity:.4;cursor:default}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-logo">IZ</div>
    <div><h1>Commande consommables</h1><div class="sub">À envoyer le vendredi avant 14h</div></div>
  </div>

  <div class="note" id="note">Trouve ton magasin, saisis les quantités, puis valide la commande. Livraison sous 6 jours.</div>
  <div class="window-info" id="windowInfo"></div>

  <!-- bandeau magasin sélectionné -->
  <div class="magbar hidden" id="magbar">
    <div class="magbar-info"><span class="magbar-lab">Magasin</span><span class="magbar-nom" id="magbarNom">—</span></div>
    <button class="magbar-change" id="changeMag">changer</button>
  </div>

  <!-- étape sélection : recherche + cartes -->
  <div id="step-select">
    <div class="searchmag"><input type="text" id="magSearch" placeholder="🔍 Tape les premières lettres de ton magasin…" autocomplete="off"></div>
    <div class="maggrid" id="maggrid"></div>
  </div>

  <!-- étape catalogue -->
  <div id="step-cat" class="hidden">
    <div id="loading" class="loading hidden"><div class="sp"></div>Chargement…</div>
    <div id="catalogue"></div>
  </div>
</div>

<div class="footer-bar hidden" id="footerBar">
  <div class="recap"><b id="recapN">0</b> article(s) · <span id="recapMag">—</span></div>
  <button class="btn" id="genBtn" disabled>Valider la commande</button>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Récapitulatif de la commande</h2>
    <div class="modal-mag" id="modalMag"></div>
    <div class="modal-list" id="modalList"></div>
    <div class="alert-box hidden" id="alertBox"></div>
    <div class="modal-form">
      <div class="ff"><label>Nom</label><input type="text" id="fNom" placeholder="Nom du demandeur"></div>
      <div class="ff"><label>Prénom</label><input type="text" id="fPrenom" placeholder="Prénom"></div>
    </div>
    <div class="just-wrap hidden" id="justWrap">
      <label>Justification (quantités inhabituelles)</label>
      <textarea id="fJust" rows="2" placeholder="Explique brièvement pourquoi ces quantités…"></textarea>
    </div>
    <label class="modal-check"><input type="checkbox" id="fCheck"> Je confirme avoir vérifié les quantités ci-dessus</label>
    <div class="modal-err" id="modalErr"></div>
    <div class="modal-actions">
      <button class="btn-close" id="cancelBtn">Modifier</button>
      <button class="btn" id="confirmBtn" disabled>Confirmer la commande</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://imurxmsglmpgxdbavalk.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImltdXJ4bXNnbG1wZ3hkYmF2YWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDg5NDMsImV4cCI6MjA5NTgyNDk0M30.GdmfOH-bG0ivzz8rFr83pZTBOjZecPgX_WXepAiuYo8';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
const TYPE_LABEL={R:'Réseau',O:'Outlet',A:'Affilié'};

let MAGS=[], ARTS=[], curMag=null, qty={};
const LS_KEY='izac_conso_mag';

function showWindowInfo(){
  const el=document.getElementById('windowInfo'); if(!el) return;
  const now=new Date();
  const j=now.getDay(), h=now.getHours(); // 5 = vendredi
  // fenêtre ouverte : on considère "à temps" jusqu'au vendredi 14h
  const open = (j<5) || (j===5 && h<14);
  if(open){
    el.className='window-info open';
    el.textContent='🟢 Fenêtre de commande ouverte — à envoyer avant vendredi 14h.';
  } else {
    el.className='window-info closed';
    el.textContent='🟠 Hors créneau (vendredi 14h passé). Ta commande sera traitée la semaine suivante.';
  }
}

async function init(){
  showWindowInfo();
  try{
    const [m,a]=await Promise.all([
      sb.from('conso_magasins').select('*').order('nom'),
      sb.from('conso_articles').select('*').order('ordre')
    ]);
    if(m.error) throw m.error; if(a.error) throw a.error;
    MAGS=m.data; ARTS=a.data;
    renderMagCards('');
    // magasin mémorisé ?
    let saved=null; try{ saved=localStorage.getItem(LS_KEY); }catch(e){}
    if(saved){ const mag=MAGS.find(x=>x.code===saved); if(mag){ selectMag(mag,false); return; } }
    showSelect();
  }catch(e){
    document.getElementById('maggrid').innerHTML='<div class="none">Erreur de chargement : '+e.message+'</div>';
  }
}

function renderMagCards(filter){
  const f=(filter||'').trim().toLowerCase();
  let list=MAGS;
  if(f) list=MAGS.filter(m=>m.nom.toLowerCase().includes(f)||(m.fastmag||'').toLowerCase().includes(f));
  const grid=document.getElementById('maggrid');
  if(!list.length){ grid.innerHTML='<div class="none">Aucun magasin ne correspond.</div>'; return; }
  grid.innerHTML=list.map(m=>`<button class="magcard" data-code="${m.code}"><div class="mn">${m.nom}</div><div class="mt">${TYPE_LABEL[m.type]}</div></button>`).join('');
}

document.getElementById('magSearch').addEventListener('input',e=>renderMagCards(e.target.value));
document.getElementById('maggrid').addEventListener('click',e=>{
  const card=e.target.closest('.magcard'); if(!card) return;
  const mag=MAGS.find(m=>m.code===card.dataset.code); if(mag) selectMag(mag,true);
});
document.getElementById('changeMag').addEventListener('click',()=>{
  try{ localStorage.removeItem(LS_KEY); }catch(e){}
  curMag=null; qty={};
  document.getElementById('magbar').classList.add('hidden');
  document.getElementById('footerBar').classList.add('hidden');
  document.getElementById('step-cat').classList.add('hidden');
  showSelect();
  document.getElementById('magSearch').value=''; renderMagCards('');
  document.getElementById('magSearch').focus();
});

function showSelect(){
  document.getElementById('step-select').classList.remove('hidden');
  document.getElementById('note').classList.remove('hidden');
}
let lastOrder=null;       // dernière commande du magasin (pour recommander)
let avgByArticle={};      // moyenne historique qté par article pour ce magasin

async function selectMag(mag,remember){
  curMag=mag; qty={};
  if(remember){ try{ localStorage.setItem(LS_KEY,mag.code); }catch(e){} }
  document.getElementById('step-select').classList.add('hidden');
  document.getElementById('note').classList.add('hidden');
  document.getElementById('magbar').classList.remove('hidden');
  document.getElementById('magbarNom').textContent=`${mag.nom} · ${TYPE_LABEL[mag.type]}`;
  document.getElementById('step-cat').classList.remove('hidden');
  await loadHistory(mag.code);
  renderCatalogue();
}

async function loadHistory(code){
  lastOrder=null; avgByArticle={};
  try{
    const {data:cmds}=await sb.from('conso_commandes').select('id,created_at').eq('mag_code',code).order('created_at',{ascending:false});
    if(cmds && cmds.length){
      const ids=cmds.map(c=>c.id);
      const {data:lignes}=await sb.from('conso_commande_lignes').select('*').in('commande_id',ids);
      if(lignes){
        // dernière commande
        const lastId=cmds[0].id;
        lastOrder=lignes.filter(l=>String(l.commande_id)===String(lastId));
        // moyenne par article (sur toutes les commandes)
        const sums={}, counts={};
        lignes.forEach(l=>{ if(l.article_id==null)return; sums[l.article_id]=(sums[l.article_id]||0)+l.quantite; counts[l.article_id]=(counts[l.article_id]||0)+1; });
        Object.keys(sums).forEach(id=>{ avgByArticle[id]=sums[id]/counts[id]; });
        // nb de commandes total pour décider si la moyenne est fiable (>=4)
        avgByArticle.__n=cmds.length;
      }
    }
  }catch(e){ /* silencieux : pas bloquant */ }
}

function renderCatalogue(){
  const arts=ARTS.filter(a=>a.profils.split(',').includes(curMag.type));
  const cats={};
  arts.forEach(a=>{ (cats[a.categorie]=cats[a.categorie]||[]).push(a); });
  let html='';
  Object.keys(cats).forEach(cat=>{
    html+=`<div class="cat"><h3>${cat}</h3>`;
    cats[cat].forEach(a=>{
      const isSiege=(a.circuit||'depot')==='siege';
      const indispo=!isSiege && !a.gencod;
      html+=`<div class="item" data-id="${a.id}">
        <div class="lib">${a.libelle}${indispo?'<div class="warn">référence non configurée — indisponible</div>':''}</div>
        <div class="qty"><input type="number" min="0" inputmode="numeric" data-id="${a.id}" ${indispo?'disabled':''} placeholder="0"></div>
      </div>`;
    });
    html+='</div>';
  });
  document.getElementById('catalogue').innerHTML=html;
  // bloc "recommander ma dernière commande"
  if(lastOrder && lastOrder.length){
    const ro=document.createElement('div'); ro.className='reorder';
    ro.innerHTML=`<span>↻ Recommander ta dernière commande (${lastOrder.length} article·s)</span><button id="reorderBtn">Reprendre</button>`;
    const cont=document.getElementById('catalogue'); cont.insertBefore(ro, cont.firstChild);
    document.getElementById('reorderBtn').addEventListener('click',applyLastOrder);
  }
  document.getElementById('catalogue').querySelectorAll('input[type=number]').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const id=inp.dataset.id, v=parseInt(inp.value,10);
      if(v>0) qty[id]=v; else delete qty[id];
      inp.closest('.item').classList.toggle('filled',v>0);
      updateRecap();
    });
  });
  document.getElementById('footerBar').classList.remove('hidden');
  document.getElementById('recapMag').textContent=curMag.nom+' · '+TYPE_LABEL[curMag.type];
  updateRecap();
}
function applyLastOrder(){
  if(!lastOrder) return;
  lastOrder.forEach(l=>{
    if(l.article_id==null) return;
    const inp=document.querySelector(`#catalogue input[data-id="${l.article_id}"]`);
    if(inp && !inp.disabled){ inp.value=l.quantite; qty[l.article_id]=l.quantite; inp.closest('.item').classList.add('filled'); }
  });
  updateRecap();
}
function updateRecap(){
  const n=Object.keys(qty).length;
  document.getElementById('recapN').textContent=n;
  document.getElementById('genBtn').disabled=n===0;
}

// adresse mail destinataire des commandes préparées au siège (à remplacer)
const EMAIL_SIEGE='ADRESSE_A_DEFINIR@izac.fr';
// adresse mail destinataire des alertes de dépassement (à remplacer)
const EMAIL_ALERTE='ADRESSE_ALERTE_A_DEFINIR@izac.fr';

// Étape 1 : ouvrir le récap
document.getElementById('genBtn').addEventListener('click',()=>{
  if(!curMag||!Object.keys(qty).length) return;
  const arts=ARTS.filter(a=>a.profils.split(',').includes(curMag.type) && qty[a.id]);
  const cats={};
  arts.forEach(a=>{ (cats[a.categorie]=cats[a.categorie]||[]).push(a); });
  let html='';
  Object.keys(cats).forEach(cat=>{
    html+=`<div class="ml-cat">${cat}</div>`;
    cats[cat].forEach(a=>{
      const siege=(a.circuit||'depot')==='siege';
      html+=`<div class="ml-row"><span>${a.libelle}${siege?'<span class="badge-s">siège</span>':''}</span><span class="q">${qty[a.id]}</span></div>`;
    });
  });
  document.getElementById('modalList').innerHTML=html;
  document.getElementById('modalMag').textContent=`${curMag.nom} · ${TYPE_LABEL[curMag.type]} · ${new Date().toLocaleDateString('fr-FR')}`;
  document.getElementById('modalErr').textContent='';

  // --- détection des dépassements (seuil fixe + moyenne 2x si historique fiable) ---
  const fiable = (avgByArticle.__n||0) >= 4;
  overQty=[];
  ARTS.forEach(a=>{
    if(!qty[a.id]) return;
    const q=qty[a.id];
    let raison=null;
    if(a.seuil_alerte!=null && q>a.seuil_alerte) raison=`plafond ${a.seuil_alerte} dépassé`;
    else if(fiable && avgByArticle[a.id] && q > 2*avgByArticle[a.id]) raison=`2× la moyenne habituelle (~${Math.round(avgByArticle[a.id])})`;
    if(raison) overQty.push({lib:a.libelle, q, raison});
  });
  const alertBox=document.getElementById('alertBox');
  const justWrap=document.getElementById('justWrap');
  if(overQty.length){
    alertBox.innerHTML='⚠️ Quantités inhabituelles :<br>'+overQty.map(o=>`• ${o.lib} : ${o.q} (${o.raison})`).join('<br>');
    alertBox.classList.remove('hidden');
    justWrap.classList.remove('hidden');
  } else {
    alertBox.classList.add('hidden'); justWrap.classList.add('hidden');
    document.getElementById('fJust').value='';
  }
  checkForm();
  document.getElementById('overlay').classList.add('show');
});
document.getElementById('cancelBtn').addEventListener('click',()=>document.getElementById('overlay').classList.remove('show'));
let overQty=[];
// activer Confirmer seulement si nom+prénom+check (+justif si dépassement)
function checkForm(){
  const base=document.getElementById('fNom').value.trim() && document.getElementById('fPrenom').value.trim() && document.getElementById('fCheck').checked;
  const justOk = overQty.length===0 || document.getElementById('fJust').value.trim().length>0;
  document.getElementById('confirmBtn').disabled=!(base && justOk);
}
['fNom','fPrenom','fJust'].forEach(id=>document.getElementById(id).addEventListener('input',checkForm));
document.getElementById('fCheck').addEventListener('change',checkForm);

// Étape 2 : confirmer -> enregistrer + générer
document.getElementById('confirmBtn').addEventListener('click',async()=>{
  const nom=document.getElementById('fNom').value.trim();
  const prenom=document.getElementById('fPrenom').value.trim();
  const justification=document.getElementById('fJust').value.trim();
  const btn=document.getElementById('confirmBtn'); btn.disabled=true;
  const err=document.getElementById('modalErr'); err.textContent='Enregistrement…';

  // n° de commande lisible : MAG-AAAAMMJJ-HHMM
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const numero=`${curMag.fastmag.replace(/[^A-Za-z0-9]/g,'').slice(0,8)}-${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}`;

  const depot=[], siege=[];
  ARTS.forEach(a=>{
    if(!qty[a.id]) return;
    if((a.circuit||'depot')==='siege') siege.push(a);
    else if(a.gencod) depot.push(a);
  });

  // enregistrer en base
  try{
    const {data:cmd,error:e1}=await sb.from('conso_commandes')
      .insert({mag_code:curMag.code,mag_nom:curMag.nom,mag_type:curMag.type,demandeur_nom:nom,demandeur_prenom:prenom,numero,justification:justification||null})
      .select().single();
    if(e1) throw e1;
    const lignes=[...depot,...siege].map(a=>({commande_id:cmd.id,article_id:a.id,libelle:a.libelle,gencod:a.gencod||'',circuit:a.circuit||'depot',quantite:qty[a.id]}));
    const {error:e2}=await sb.from('conso_commande_lignes').insert(lignes);
    if(e2) throw e2;
  }catch(e){ err.textContent='Erreur enregistrement : '+e.message; btn.disabled=false; return; }

  // TXT dépôt
  if(depot.length){
    const lines=depot.map(a=>`${a.gencod}\t${qty[a.id]}\t\t`);
    const txt=lines.join('\r\n')+'\r\n';
    const fname=curMag.fastmag.replace(/[^A-Za-z0-9_-]/g,'_')+'.txt';
    const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=fname; a.click();
    URL.revokeObjectURL(url);
  }
  // mail siège
  if(siege.length){
    const today=new Date().toLocaleDateString('fr-FR');
    const subject=`Commande consommables (siège) — ${curMag.nom} — ${today}`;
    let body=`N° commande : ${numero}\nMagasin : ${curMag.nom} (${TYPE_LABEL[curMag.type]})\nCode : ${curMag.code}\nDemandeur : ${prenom} ${nom}\nDate : ${today}\n\nArticles à préparer au siège :\n`;
    siege.forEach(a=>{ body+=`- ${a.libelle} : ${qty[a.id]}\n`; });
    if(justification) body+=`\nJustification : ${justification}\n`;
    body+=`\nMerci.`;
    const mailto=`mailto:${encodeURIComponent(EMAIL_SIEGE)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    setTimeout(()=>{ window.location.href=mailto; }, depot.length?600:0);
  }

  // mail d'alerte au siège si quantités inhabituelles
  if(overQty.length){
    const today=new Date().toLocaleDateString('fr-FR');
    const subject=`⚠️ ALERTE quantités — ${curMag.nom} — ${today}`;
    let body=`Alerte : quantités inhabituelles sur la commande ${numero}.\n\nMagasin : ${curMag.nom} (${TYPE_LABEL[curMag.type]})\nDemandeur : ${prenom} ${nom}\nDate : ${today}\n\nArticles concernés :\n`;
    overQty.forEach(o=>{ body+=`- ${o.lib} : ${o.q} (${o.raison})\n`; });
    body+=`\nJustification du magasin : ${justification||'(aucune)'}\n`;
    const mailto=`mailto:${encodeURIComponent(EMAIL_ALERTE)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    setTimeout(()=>{ window.location.href=mailto; }, (depot.length?600:0)+(siege.length?1200:600));
  }

  // fermer + réinitialiser (on garde le magasin sélectionné)
  document.getElementById('overlay').classList.remove('show');
  showDone(depot.length, siege.length, numero);
  qty={}; document.getElementById('fNom').value=''; document.getElementById('fPrenom').value=''; document.getElementById('fCheck').checked=false;
  document.getElementById('fJust').value=''; overQty=[];
  lastOrder=null; await loadHistory(curMag.code); // recharge l'historique (la nouvelle commande devient la dernière)
  renderCatalogue();  // ré-affiche le catalogue vidé pour le même magasin
});

function showDone(nDepot,nSiege,numero){
  const parts=[];
  if(nDepot) parts.push(`fichier dépôt téléchargé (${nDepot} article·s)`);
  if(nSiege) parts.push(`email siège préparé (${nSiege} article·s)`);
  let msg=document.getElementById('doneMsg');
  if(!msg){ msg=document.createElement('div'); msg.id='doneMsg'; msg.style.cssText='position:fixed;bottom:74px;left:0;right:0;text-align:center;font-size:13px;color:var(--green);font-weight:700;z-index:55;padding:0 16px'; document.body.appendChild(msg); }
  msg.innerHTML=`✓ Commande <b>${numero||''}</b> enregistrée — `+parts.join(' · ');
  setTimeout(()=>{ if(msg) msg.textContent=''; }, 8000);
}

init();
</script>
</body>
</html>
